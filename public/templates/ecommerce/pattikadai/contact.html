<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Organic Store</title>
  <link rel="icon" href="assets/img/favicon/favicon.png">
  <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/vendor/remixicon.css">
  <link rel="stylesheet" href="assets/css/vendor/aos.css">
  <link rel="stylesheet" href="assets/css/vendor/swiper-bundle.min.css">
  <link rel="stylesheet" href="assets/css/vendor/owl.carousel.min.css">
  <link rel="stylesheet" href="assets/css/vendor/animate.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>

  <header class="bb-header" id="header-placeholder"></header>
  <div class="header-spacer"></div>

  <div class="bb-breadcrumb">
    <div class="container">
      <h1>Contact Us</h1>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a href="/">Home</a></li>
          <li class="breadcrumb-item active">Contact Us</li>
        </ol>
      </nav>
    </div>
  </div>

  <section class="container mt-4 mb-5">
    <div class="row">
      <div class="col-lg-6 mb-4">
        <h3 class="fw-bold mb-4">Get in Touch</h3>

        <div class="d-flex gap-3 mb-4">
          <div style="width: 50px; height: 50px; background: rgba(26,71,42,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <i class="ri-map-pin-line fs-4" style="color: var(--bb-main-color);"></i>
          </div>
          <div>
            <h6 class="fw-bold mb-1">Address</h6>
            <p class="text-muted mb-0">Your Store Address, City, State — PIN Code</p>
          </div>
        </div>

        <div class="d-flex gap-3 mb-4">
          <div style="width: 50px; height: 50px; background: rgba(26,71,42,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <i class="ri-whatsapp-line fs-4" style="color: var(--bb-main-color);"></i>
          </div>
          <div>
            <h6 class="fw-bold mb-1">WhatsApp / Phone</h6>
            <p class="mb-0"><a href="tel:+910000000000" class="text-muted">+91 XXXXX XXXXX</a></p>
          </div>
        </div>

        <div class="d-flex gap-3 mb-4">
          <div style="width: 50px; height: 50px; background: rgba(26,71,42,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <i class="ri-mail-line fs-4" style="color: var(--bb-main-color);"></i>
          </div>
          <div>
            <h6 class="fw-bold mb-1">Email</h6>
            <p class="mb-0"><a href="mailto:store@example.com" class="text-muted">store@example.com</a></p>
          </div>
        </div>

        <div class="d-flex gap-3">
          <a href="#" target="_blank" class="btn btn-outline-dark btn-sm"><i class="ri-facebook-fill"></i></a>
          <a href="#" target="_blank" class="btn btn-outline-dark btn-sm"><i class="ri-youtube-fill"></i></a>
          <a href="#" target="_blank" class="btn btn-outline-dark btn-sm"><i class="ri-instagram-line"></i></a>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="p-4 border rounded-3">
          <h5 class="fw-bold mb-3">Send us a Message</h5>
          <form id="contact-form" onsubmit="submitContactForm(event)">
            <div class="mb-3">
              <label class="form-label">Name *</label>
              <input type="text" class="form-control" id="contact-name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email *</label>
              <input type="email" class="form-control" id="contact-email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-control" id="contact-phone">
            </div>
            <div class="mb-3">
              <label class="form-label">Message *</label>
              <textarea class="form-control" id="contact-message" rows="4" required></textarea>
            </div>
            <div id="contact-status"></div>
            <button type="submit" class="btn bb-btn-2 w-100">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/main.js"></script>

  <script>
    async function submitContactForm(e) {
      e.preventDefault();
      const status = document.getElementById('contact-status');

      // Try to save to Supabase enquiries table if it exists
      try {
        const sb = getSupabase();
        await sb.from('enquiries').insert([{
          company_id: STORE_CONFIG.companyId,
          name: document.getElementById('contact-name').value,
          email: document.getElementById('contact-email').value,
          phone: document.getElementById('contact-phone').value,
          message: document.getElementById('contact-message').value,
          source: 'website_contact',
        }]);
      } catch (err) {
        // Silently fail - enquiries table may not exist
      }

      status.innerHTML = '<div class="alert alert-success mt-3">Thank you! Your message has been sent. We\'ll get back to you soon.</div>';
      document.getElementById('contact-form').reset();
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
