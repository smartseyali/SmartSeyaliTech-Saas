<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Pattikadai</title>
  <link rel="icon" href="assets/img/favicon/favicon.png">
  <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/vendor/remixicon.css">
  <link rel="stylesheet" href="assets/css/vendor/aos.css">
  <link rel="stylesheet" href="assets/css/vendor/swiper-bundle.min.css">
  <link rel="stylesheet" href="assets/css/vendor/owl.carousel.min.css">
  <link rel="stylesheet" href="assets/css/vendor/animate.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>

  <header class="bb-header" id="header-placeholder"></header>
  <div class="header-spacer"></div>

  <section class="container mt-4 mb-5">
    <div class="auth-container" style="max-width: 550px;">
      <div class="text-center mb-4">
        <img src="assets/img/logo/logo.gif" alt="Pattikadai" style="height: 60px;">
      </div>
      <h2>Create Account</h2>
      <p class="text-center text-muted mb-4">Join us for authentic country foods</p>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">First Name *</label>
            <input type="text" class="form-control" id="reg-fname" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Last Name *</label>
            <input type="text" class="form-control" id="reg-lname" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email *</label>
          <input type="email" class="form-control" id="reg-email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Phone</label>
          <input type="tel" class="form-control" id="reg-phone">
        </div>

        <div class="mb-3">
          <label class="form-label">Password *</label>
          <input type="password" class="form-control" id="reg-password" required minlength="6">
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password *</label>
          <input type="password" class="form-control" id="reg-confirm" required minlength="6">
        </div>

        <div id="register-error" class="alert alert-danger d-none"></div>
        <div id="register-success" class="alert alert-success d-none"></div>

        <button type="submit" class="btn bb-btn-2 w-100 py-2" id="register-btn">Create Account</button>
      </form>

      <hr>
      <p class="text-center mb-0">
        Already have an account? <a href="login.html" class="fw-bold" style="color: var(--bb-main-color);">Login</a>
      </p>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/main.js"></script>

  <script>
    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const errorEl = document.getElementById('register-error');
      const successEl = document.getElementById('register-success');
      errorEl.classList.add('d-none');
      successEl.classList.add('d-none');

      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match';
        errorEl.classList.remove('d-none');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Account...';

      try {
        await Auth.register(
          document.getElementById('reg-email').value,
          password,
          {
            first_name: document.getElementById('reg-fname').value,
            last_name: document.getElementById('reg-lname').value,
            full_name: `${document.getElementById('reg-fname').value} ${document.getElementById('reg-lname').value}`,
            phone: document.getElementById('reg-phone').value,
          }
        );

        successEl.textContent = 'Account created successfully! Redirecting...';
        successEl.classList.remove('d-none');
        document.getElementById('register-form').reset();
        setTimeout(() => { window.location.href = 'my-orders.html'; }, 1500);
      } catch (err) {
        errorEl.textContent = err.message || 'Registration failed';
        errorEl.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
