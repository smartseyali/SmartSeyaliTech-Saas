<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contact — Your Product</title>
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<header>
  <div class="container nav">
    <a href="index.html" class="brand"><span class="mark">S</span><span data-content="brand_name">Your Product</span></a>
    <ul><li><a href="index.html">Home</a></li><li><a href="pricing.html">Pricing</a></li></ul>
  </div>
</header>
<main>
  <section class="container hero">
    <h1>Get in touch</h1>
    <p data-content="intro">We usually reply within one business day.</p>
  </section>
  <section class="section">
    <div class="container">
      <form class="form" onsubmit="event.preventDefault();alert('Thanks! We\'ll get back to you soon.');this.reset();">
        <input type="text" placeholder="Your name" required />
        <input type="email" placeholder="Your email" required />
        <textarea rows="5" placeholder="How can we help?" required></textarea>
        <button type="submit" class="cta">Send message</button>
      </form>
    </div>
  </section>
</main>
<footer><div class="container">&copy; <span id="yr"></span> <span data-content="brand_name">Your Product</span></div></footer>
<script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
<script src="assets/js/config.js"></script>
<script src="assets/js/content-loader.js"></script>
</body>
</html>
