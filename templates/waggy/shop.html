<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Premium Catalog</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-white">

    <!-- Header -->
    <header>
        <div class="container flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" id="store-logo" class="brand-font text-2xl font-black text-slate-800"
                    style="text-decoration: none;">STORE</a>
                <nav class="flex gap-6">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link active">Shop</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="cart-btn p-2 text-slate-400 hover:text-slate-800 transition-all">
                    <i data-lucide="shopping-bag"></i>
                    <span class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Page Header -->
    <div class="py-24 bg-slate-50 border-b border-slate-100">
        <div class="container">
            <h1 class="text-5xl font-black text-slate-800 animate-slide-up">Shop Our Collections</h1>
            <p class="text-slate-400 mt-4 text-lg">Discover curated premium products selected just for you.</p>
        </div>
    </div>

    <!-- Shop Content -->
    <section class="py-24">
        <div class="container">
            <div class="shop-layout flex gap-12">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <div class="filter-group shadow-xl">
                        <span class="filter-title">Categories</span>
                        <div id="categories-filters" class="flex flex-col">
                            <label class="filter-item text-primary font-bold">
                                <input type="radio" name="category" value="all" checked />
                                All Products
                            </label>
                            <!-- Dynamically populated -->
                        </div>
                    </div>
                </aside>

                <!-- Product Grid -->
                <main class="flex-1">
                    <div class="flex justify-between items-center mb-12">
                        <span id="results-count" class="text-sm font-bold text-slate-400 uppercase tracking-widest">
                            Showing 0 products
                        </span>
                        <select
                            class="px-6 py-3 border border-slate-200 rounded-2xl text-sm font-bold bg-white shadow-sm outline-none">
                            <option>Newest Arrivals</option>
                            <option>Price: Low to High</option>
                            <option>Price: High to Low</option>
                        </select>
                    </div>

                    <div class="products-grid grid"
                        style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 3rem;">
                        <!-- Dynamically populated via shop.js -->
                        <div class="col-span-full h-80 flex flex-col items-center justify-center text-slate-300 gap-4">
                            <div class="w-10 h-10 rounded-full border-4 border-slate-100 border-t-primary animate-spin">
                            </div>
                            <span class="font-black uppercase tracking-wider text-xs">Fetching Inventory...</span>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-24 bg-white border-t border-slate-100">
        <div class="container text-center text-xs font-bold text-slate-400 uppercase tracking-widest">
            &copy; 2024 Storefront. All rights reserved. Powered by Ecommerce SaaS.
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/shop.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            // Re-run for dynamic items
            setTimeout(() => lucide.createIcons(), 2000);
        });
    </script>
</body>

</html>
