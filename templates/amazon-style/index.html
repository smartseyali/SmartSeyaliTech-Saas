<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Bazaar | Online Shopping for Electronics, Apparel, Computers, Books, DVDs & more</title>
    <meta name="description"
        content="Grand Bazaar - Free Shipping on millions of items. Get the best of Shopping and Entertainment with Bazaar Prime.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ── Amazon-style Grid Layout ── */
        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .cat-card {
            background: var(--white);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .cat-card h2 {
            font-size: 21px;
            font-weight: 700;
            color: #0F1111;
        }

        .cat-grid-4 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .cat-grid-item {
            cursor: pointer;
        }

        .cat-grid-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            margin-bottom: 4px;
        }

        .cat-grid-item span {
            font-size: 11px;
            color: #0F1111;
        }

        .cat-card a {
            color: #007185;
            font-size: 13px;
            font-weight: 500;
            margin-top: auto;
        }

        .cat-card a:hover {
            color: #C7511F;
            text-decoration: underline;
        }

        /* ── Product Card Refinement ── */
        .product-card {
            background: white;
            padding: 10px;
            border: none;
            box-shadow: none;
            border-radius: 0;
        }

        .product-card:hover {
            transform: none;
            box-shadow: none;
        }

        .product-image {
            background: #f8f8f8;
            margin-bottom: 8px;
        }

        .product-title {
            font-size: 14px;
            color: #007185;
            padding: 0;
            font-weight: 500;
        }

        .product-title:hover {
            color: #C7511F;
            text-decoration: underline;
        }

        .current-price {
            font-size: 21px;
            font-weight: 500;
            color: #0F1111;
            display: flex;
            align-items: flex-start;
        }

        .current-price::before {
            content: '₹';
            font-size: 12px;
            margin-top: 4px;
            margin-right: 2px;
        }

        .offer-label {
            background: #CC0C39;
            border-radius: 2px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <header id="main-header"></header>

    <main class="container">
        <!-- Hero Slider -->
        <section id="hero-slider" class="hero-slider" style="margin-top:20px"></section>

        <!-- Home Grid (Categories + Promotional Cards) -->
        <div class="home-grid" id="home-cat-grid">
            <!-- Dynamic Category Cards will load here -->
        </div>

        <!-- Active Offers / Coupons strip -->
        <div id="offers-strip-wrap" style="display:none">
            <div class="offers-strip" id="offers-strip"></div>
        </div>

        <!-- Featured Products -->
        <section class="section">
            <div class="section-header">
                <h2>Featured Products</h2>
                <a href="shop.html?featured=1">View All</a>
            </div>
            <div id="featured-products" class="product-grid"></div>
        </section>

        <!-- Best Sellers -->
        <section class="section">
            <div class="section-header">
                <h2>Best Sellers</h2>
                <a href="shop.html?bestseller=1">View All</a>
            </div>
            <div id="best-sellers" class="product-grid"></div>
        </section>
    </main>

    <script type="module">
        import ui from './js/ui.js';
        import api from './js/api.js';
        import { mapper } from './js/mapper.js';

        async function init() {
            try { await ui.init(); } catch (e) { console.warn('ui.init:', e); }

            // ── Hero Banners ──────────────────────────────────────
            try {
                const banners = await api.getBanners();
                const slider = document.getElementById('hero-slider');
                if (banners.length) {
                    slider.innerHTML = banners.map((b, i) => `
                        <div class="slide ${i === 0 ? 'active' : ''}">
                            <img src="${b.image_url}" alt="${b.title || 'Banner'}" style="width:100%;border-radius:12px;object-fit:cover;max-height:360px">
                            ${b.title ? `<div class="slide-caption"><h2>${b.title}</h2><p>${b.subtitle || ''}</p></div>` : ''}
                        </div>
                    `).join('');
                    // Auto-play slider
                    let current = 0;
                    const slides = slider.querySelectorAll('.slide');
                    if (slides.length > 1) {
                        const interval = setInterval(() => {
                            if (!slides[current]) return clearInterval(interval);
                            slides[current].classList.remove('active');
                            current = (current + 1) % slides.length;
                            slides[current].classList.add('active');
                        }, 3500);
                    }
                } else {
                    slider.style.display = 'none';
                }
            } catch (e) { document.getElementById('hero-slider').style.display = 'none'; }

            // ── Categories Grid ──────────────────────────────────
            try {
                const cats = await api.getCategories();
                const grid = document.getElementById('home-cat-grid');
                if (cats.length) {
                    // Group into chunks of 4 for the "Amazon Squares"
                    const mainCard = `
                        <div class="cat-card">
                            <h2>Shop by Category</h2>
                            <div class="cat-grid-4">
                                ${cats.slice(0, 4).map(cat => `
                                    <div class="cat-grid-item" onclick="location.href='category.html?id=${cat.id}'">
                                        <img src="${cat.image_url || 'https://via.placeholder.com/150'}" alt="${cat.name}">
                                        <span>${cat.name}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <a href="shop.html">Shop all categories</a>
                        </div>
                    `;

                    // Add more mock cards for Amazon feel
                    const mockCards = [
                        { title: "Up to 70% off | Clearance store", img: "https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=400", link: "shop.html", label: "See more" },
                        { title: "Bazaar Pay | Use your credits", img: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=400", link: "profile.html", label: "Check balance" }
                    ];

                    grid.innerHTML = mainCard + mockCards.map(c => `
                        <div class="cat-card">
                            <h2>${c.title}</h2>
                            <img src="${c.img}" style="width:100%; height:250px; object-fit:cover; margin-bottom:10px; cursor:pointer" onclick="location.href='${c.link}'">
                            <a href="${c.link}">${c.label}</a>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.warn('Categories load error:', e);
            }

            // ── Active Offers strip ───────────────────────────────
            try {
                const offers = await api.getActiveOffers?.();
                if (offers?.length) {
                    const strip = document.getElementById('offers-strip');
                    strip.innerHTML = offers.map(o => `
                        <div class="offer-pill" onclick="location.href='shop.html'">
                            <span class="off">${o.discount_type === 'percentage' ? `${o.discount_value}% OFF` : `₹${o.discount_value} OFF`}</span>
                            ${o.title || o.badge_label || 'Special Offer'}
                        </div>`).join('');
                    document.getElementById('offers-strip-wrap').style.display = 'block';
                }
            } catch (e) { console.warn('Offers load error:', e); }

            // ── Featured Products ─────────────────────────────────
            try {
                const featured = await api.getProducts({ is_featured: true });
                document.getElementById('featured-products').innerHTML =
                    featured.length
                        ? featured.map(p => renderCard(p)).join('')
                        : '<p class="empty-msg" style="grid-column:1/-1">No featured products yet.</p>';
            } catch (e) { document.getElementById('featured-products').innerHTML = '<p class="empty-msg" style="grid-column:1/-1">Failed to load.</p>'; }

            // ── Best Sellers ──────────────────────────────────────
            try {
                const best = await api.getProducts({ is_best_seller: true });
                document.getElementById('best-sellers').innerHTML =
                    best.length
                        ? best.map(p => renderCard(p)).join('')
                        : '<p class="empty-msg" style="grid-column:1/-1">No best sellers yet.</p>';
            } catch (e) { document.getElementById('best-sellers').innerHTML = '<p class="empty-msg" style="grid-column:1/-1">Failed to load.</p>'; }
        }

        function renderCard(p) {
            const m = mapper.mapProduct(p);
            return `
                <div class="product-card fade-in" onclick="location.href='product.html?id=${m.id}'">
                    ${m.discountLabel ? `<span class="offer-label">${m.discountLabel}</span>` : ''}
                    <img src="${m.image}" class="product-image" alt="${m.name}" loading="lazy"
                        onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'">
                    <h3 class="product-title">${m.name}</h3>
                    <div class="product-price-row" style="padding:0">
                        <span class="current-price">${mapper.formatPriceParts(m.price)}</span>
                        ${m.comparePrice ? `<span class="compare-price" style="margin-left:5px">M.R.P: ${mapper.formatCurrency(m.comparePrice)}</span>` : ''}
                    </div>
                    ${m.discountLabel ? `<p style="font-size:12px; color:#CC0C39; margin-top:4px">Save ${m.discountLabel}</p>` : ''}
                    <p style="font-size:12px; color:#565959; margin-top:2px">FREE Delivery by Grand Bazaar</p>
                </div>`;
        }

        init();
    </script>
</body>

</html>
