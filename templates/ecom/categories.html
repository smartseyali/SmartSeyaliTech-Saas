<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Categories | BASIK FIT</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/home.css">
    <style>
        .categories-grid-full {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .category-item {
            position: relative;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 2.5rem;
            color: #fff;
            text-decoration: none;
            transition: var(--transition);
        }

        .category-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transition: var(--transition);
        }

        .category-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 60%);
            z-index: 2;
        }

        .category-content {
            position: relative;
            z-index: 3;
        }

        .category-content h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .category-content p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 1.5rem;
        }

        .category-item:hover img {
            transform: scale(1.05);
        }

        .category-item:hover {
            box-shadow: var(--shadow-xl);
        }

        .category-placeholder {
            background: linear-gradient(135deg, var(--primary), #333);
        }
    </style>
</head>

<body>

    <div id="header-root"></div>

    <main class="container section">
        <header class="section-title-wrapper" style="flex-direction: column; align-items: flex-start; gap: 1rem;">
            <h1>Shop by Category</h1>
            <p style="color: var(--text-muted); max-width: 600px;">Explore our curated collections designed for every
                movement, from casual walks to high-intensity training.</p>
        </header>

        <div class="categories-grid-full" id="categories-grid">
            <!-- Categories loaded dynamically from DB -->
            <p style="text-align:center;color:var(--text-muted);padding:3rem;grid-column:1/-1;">Loading categories...
            </p>
        </div>
    </main>

    <div id="footer-root"></div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        // Default category images as fallback
        const defaultCatImages = [
            'assets/images/aqua.png',
            'assets/images/red.png',
            'assets/images/yellow.png',
            'assets/images/green.png'
        ];

        async function loadCategories() {
            // Wait for API/tenant
            let retries = 0;
            while ((!window.API || !window.API.tenant) && retries < 50) {
                await new Promise(r => setTimeout(r, 100));
                retries++;
            }
            if (!window.API || !window.API.tenant) {
                console.warn('API not ready');
                return;
            }

            const grid = document.getElementById('categories-grid');

            // Try to get categories from ecom_categories table
            try {
                const client = window.supabaseClient;
                if (client) {
                    const { data: categories } = await client
                        .from('ecom_categories')
                        .select('*')
                        .eq('company_id', window.API.tenant.id);

                    if (categories && categories.length > 0) {
                        grid.innerHTML = categories.map((cat, i) => {
                            const img = cat.image_url || defaultCatImages[i % defaultCatImages.length];
                            return `
                            <a href="shop.html?cat=${encodeURIComponent(cat.name)}" class="category-item">
                                <img src="${img}" alt="${cat.name}">
                                <div class="category-content">
                                    <h2>${cat.name}</h2>
                                    <p>${cat.description || ''}</p>
                                    <span class="btn btn-outline" style="color:#fff; border-color:#fff;">SHOP NOW</span>
                                </div>
                            </a>`;
                        }).join('');
                        return;
                    }
                }
            } catch (e) {
                console.log('ecom_categories table not found, building from products');
            }

            // Fallback: build categories from product data
            const products = await window.API.getProducts();
            const catNames = [...new Set((products || []).map(p => p.category_name).filter(Boolean))];

            if (catNames.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:3rem;grid-column:1/-1;">No categories found. Add products from the admin panel.</p>';
                return;
            }

            grid.innerHTML = catNames.map((name, i) => {
                const img = defaultCatImages[i % defaultCatImages.length];
                return `
                <a href="shop.html?cat=${encodeURIComponent(name)}" class="category-item">
                    <img src="${img}" alt="${name}">
                    <div class="category-content">
                        <h2>${name}</h2>
                        <p>Browse our ${name.toLowerCase()} collection</p>
                        <span class="btn btn-outline" style="color:#fff; border-color:#fff;">SHOP NOW</span>
                    </div>
                </a>`;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', () => loadCategories());
    </script>
</body>

</html>
