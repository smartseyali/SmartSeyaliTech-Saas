<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | BASIK FIT Personal Hub</title>
    <!-- Common Libs -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/merchant.css">
</head>

<body>

    <div id="header-root"></div>

    <main class="container section">
        <div class="m-main" style="padding: 0;">
            <header class="m-header" style="margin-bottom: 3rem;">
                <div class="m-header-left">
                    <h1 id="user-greeting">Hello, Guest</h1>
                    <p>Manage your orders, profile, and preferences here.</p>
                </div>
                <div class="m-header-right">
                    <button class="btn btn-outline" onclick="logout()">Sign Out</button>
                    <button class="btn btn-primary" onclick="window.location.href='shop.html'">Keep Shopping</button>
                </div>
            </header>

            <div class="m-stats-grid" style="grid-template-columns: repeat(2, 1fr);">
                <div class="m-stat-card">
                    <span class="m-stat-label">Member Points</span>
                    <h3 class="m-stat-val">2,450 <i class="fa-solid fa-crown"
                            style="font-size: 1rem; color: #f59e0b;"></i></h3>
                </div>
                <div class="m-stat-card">
                    <span class="m-stat-label">Wishlist Items</span>
                    <h3 class="m-stat-val" id="wishlist-count">0</h3>
                </div>
            </div>

            <section class="m-table-section">
                <div class="table-header">
                    <h3>My Recent Orders</h3>
                </div>
                <table class="m-table">
                    <thead>
                        <tr>
                            <th>Order #</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Total</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#BK-1052</td>
                            <td><span class="m-status shipped">Delivered</span></td>
                            <td>Feb 20, 2026</td>
                            <td>$124.00</td>
                            <td><button class="btn btn-outline btn-sm">View Details</button></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <div id="footer-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        async function initAccount() {
            // Wait for API/tenant
            let retries = 0;
            while ((!window.API || !window.API.tenant) && retries < 50) {
                await new Promise(r => setTimeout(r, 100));
                retries++;
            }
            if (!window.API) return;

            const user = await window.API.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const name = user.user_metadata?.full_name || user.email.split('@')[0];
            document.getElementById('user-greeting').textContent = `Hello, ${name}`;

            // Load orders from DB
            const orders = await window.API.getOrders();
            const tbody = document.querySelector('.m-table tbody');
            if (orders && orders.length > 0) {
                tbody.innerHTML = orders.map(o => `
                    <tr>
                        <td>#${o.id}</td>
                        <td><span class="m-status ${o.status}">${o.status}</span></td>
                        <td>${new Date(o.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</td>
                        <td>$${(o.total || 0).toFixed(2)}</td>
                        <td><button class="btn btn-outline btn-sm">View Details</button></td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted);">No orders yet. Start shopping!</td></tr>';
            }
        }

        async function logout() {
            if (window.API) await window.API.signOut();
            window.location.href = 'login.html';
        }

        document.addEventListener('DOMContentLoaded', () => initAccount());
    </script>
</body>

</html>
