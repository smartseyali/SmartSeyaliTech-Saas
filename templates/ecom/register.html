<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | BASIK FIT Premium</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>

<body class="auth-main">

    <div id="header-root"></div>
    <div class="auth-bg-blob"></div>

    <div class="auth-wrapper">
        <main class="auth-container">
            <header class="auth-header">
                <div class="logo">
                    <a href="index.html">BASIK <span>FIT</span></a>
                </div>
                <h1>Create Account</h1>
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </header>

            <form id="register-form">
                <div class="auth-form-group">
                    <label>Full Name</label>
                    <div class="auth-input-wrapper">
                        <input type="text" id="name-field" placeholder="e.g. John Doe" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="auth-form-group">
                    <label>Email Address</label>
                    <div class="auth-input-wrapper">
                        <input type="email" id="email-field" placeholder="e.g. natesh@example.com" required>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                </div>

                <div class="auth-form-group">
                    <label>Password</label>
                    <div class="auth-input-wrapper">
                        <input type="password" id="password-field" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye" onclick="togglePass()"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full auth-btn">Create Account</button>
            </form>
        </main>
    </div>

    <div id="footer-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        function togglePass() {
            const field = document.getElementById('password-field');
            field.type = field.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('name-field').value;
            const email = document.getElementById('email-field').value;
            const password = document.getElementById('password-field').value;
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            let retries = 0;
            while ((!window.API || !window.API.tenant) && retries < 30) {
                await new Promise(r => setTimeout(r, 100));
                retries++;
            }

            if (window.API) {
                const { data, error } = await window.API.signUp(email, password, { full_name: name });
                if (error) {
                    alert('Registration failed: ' + error.message);
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                    return;
                }
                if (window.StorefrontInstance) {
                    window.StorefrontInstance.pushNotification('Account created successfully!');
                }
                setTimeout(() => window.location.href = 'account.html', 1000);
            } else {
                alert('System not ready. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        };
    </script>
</body>

</html>
