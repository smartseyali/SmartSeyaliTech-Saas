<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Premium Storefront</title>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50">

    <!-- Elite Header -->
    <header id="main-header" class="scrolled">
        <div class="container flex items-center justify-between w-full">
            <div class="flex items-center gap-10">
                <a href="index.html" id="store-logo" class="brand-font"
                    style="text-decoration: none; font-size: 1.8rem; color: var(--s-950);">STORE</a>
                <nav class="flex gap-4">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                </nav>
            </div>
            <div class="flex items-center gap-6">
                <a href="profile.html" class="nav-link active" aria-label="Account"><i data-lucide="user"
                        style="width:20px;"></i></a>
                <a href="cart.html" class="nav-link" style="position: relative;" aria-label="Cart">
                    <i data-lucide="shopping-bag" style="width:20px;"></i>
                    <span id="cart-counter"
                        style="position: absolute; top: -5px; right: -5px; background: var(--p-900); color: white; font-size: 10px; font-weight: 900; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid #fff;">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Page Title Panel -->
    <section class="py-24 bg-white border-b border-slate-100">
        <div class="container flex justify-between items-end">
            <div>
                <span class="label">Identity Archive</span>
                <h1 class="section-title" style="margin:0;">Personal Dashboard</h1>
                <p class="section-subtitle" style="margin-top: 1.5rem; color: var(--s-400);">Managing your professional
                    organic commerce relationship.</p>
            </div>
            <button id="logout-btn" class="btn btn-ghost" style="padding: 1rem 2rem; border-radius: 99px;">Terminate
                Session</button>
        </div>
    </section>

    <!-- Profile Dashboard -->
    <section class="py-24">
        <div class="container">
            <div class="dashboard-layout" style="grid-template-columns: 320px 1fr; gap: 4rem;">

                <!-- Advanced Intelligence Sidebar -->
                <aside class="dashboard-sidebar" style="position: sticky; top: 124px;">
                    <div class="space-y-10">
                        <section>
                            <h3 class="label">Personal Menu</h3>
                            <div class="grid gap-2 mt-6">
                                <button class="sidebar-btn active" data-tab="details">
                                    <i data-lucide="user-circle" style="width: 18px;"></i>
                                    Identity Data
                                </button>
                                <button class="sidebar-btn" data-tab="orders">
                                    <i data-lucide="package" style="width: 18px;"></i>
                                    Purchase History
                                </button>
                                <button class="sidebar-btn" data-tab="addresses">
                                    <i data-lucide="map-pin" style="width: 18px;"></i>
                                    Destinations
                                </button>
                            </div>
                        </section>
                    </div>
                </aside>

                <!-- Dynamic Content Panel -->
                <main id="tab-content" class="space-y-12">
                    <!-- Populated via profile.js -->
                    <div class="card p-20 text-center label animate-pulse">Syncing personal intelligence...</div>
                </main>

            </div>
        </div>
    </section>

    <!-- Elite Footer -->
    <footer>
        <div class="container mt-24 pt-8 border-t border-white/5 text-center">
            <p class="label" style="color: var(--s-600);">&copy; 2026 Storefront. Precision Built.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
