<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .flex {
            display: flex;
        }

        .grid {
            display: grid;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .flex-col {
            flex-direction: column;
        }

        .gap-4 {
            gap: 1rem;
        }

        .gap-6 {
            gap: 1.5rem;
        }

        .py-12 {
            padding-top: 3rem;
            padding-bottom: 3rem;
        }

        .text-slate-400 {
            color: #94a3b8;
        }

        .text-slate-800 {
            color: #1e293b;
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .text-lg {
            font-size: 1.125rem;
        }

        .text-3xl {
            font-size: 1.875rem;
        }

        .font-bold {
            font-weight: 700;
        }

        .font-black {
            font-weight: 900;
        }

        .rounded-2xl {
            border-radius: 1rem;
        }

        .rounded-3xl {
            border-radius: 1.5rem;
        }

        .bg-white {
            background-color: white;
        }

        .bg-slate-50 {
            background-color: #f8fafc;
        }

        .bg-primary {
            background-color: var(--primary);
        }

        .w-full {
            width: 100%;
        }

        .h-full {
            height: 100%;
        }

        .transition-all {
            transition: all 0.2s;
        }

        .shadow-lg {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .cart-item {
            border-bottom: 1px solid #f1f5f9;
            padding: 1.5rem 0;
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 1.5rem;
            align-items: center;
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            border-radius: 1rem;
            object-fit: cover;
            background: #f8fafc;
        }
    </style>
</head>

<body class="bg-white">

    <!-- Header -->
    <header>
        <div class="container flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" id="store-logo" class="brand-font text-2xl font-black text-slate-800"
                    style="text-decoration: none;">STORE</a>
                <nav class="flex gap-6">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="cart-btn p-2 text-slate-400 hover:text-slate-800 transition-all">
                    <i data-lucide="shopping-bag"></i>
                    <span class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Cart Content -->
    <section class="py-12">
        <div class="container">
            <h1 class="text-3xl font-black mb-12">Shopping Bag</h1>

            <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 4rem;">

                <!-- Items List -->
                <div class="cart-items-container">
                    <div id="cart-list" class="flex flex-col">
                        <!-- Populated via cart.js -->
                    </div>
                </div>

                <!-- Summary Sidebar -->
                <aside
                    class="cart-summary sticky top-24 h-fit p-8 bg-slate-50 rounded-3xl border border-slate-100 shadow-lg">
                    <h2 class="text-xl font-bold mb-6">Order Summary</h2>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400">Subtotal</span>
                            <span id="subtotal" class="font-bold">₹ 0.00</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400">Shipping</span>
                            <span class="text-green-600 font-bold">FREE</span>
                        </div>
                        <div class="pt-4 border-t border-slate-200 flex justify-between items-center">
                            <span class="font-black text-lg">Total</span>
                            <span id="total" class="font-black text-2xl text-primary">₹ 0.00</span>
                        </div>
                    </div>

                    <a href="checkout.html" class="btn btn-primary w-full h-14 justify-center text-lg">
                        Proceed to Checkout
                    </a>
                </aside>

            </div>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setTimeout(() => lucide.createIcons(), 2000);
        });
    </script>
</body>

</html>
