<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Bag | Premium Storefront</title>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-white">

    <!-- Elite Header -->
    <header id="main-header" class="scrolled">
        <div class="container flex items-center justify-between w-full">
            <div class="flex items-center gap-10">
                <a href="index.html" id="store-logo" class="brand-font"
                    style="text-decoration: none; font-size: 1.8rem; color: var(--s-950);">STORE</a>
                <nav class="flex gap-4">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                </nav>
            </div>
            <div class="flex items-center gap-6">
                <a href="profile.html" class="nav-link" aria-label="Account"><i data-lucide="user"
                        style="width:20px;"></i></a>
                <a href="cart.html" class="nav-link active" style="position: relative;" aria-label="Cart">
                    <i data-lucide="shopping-bag" style="width:20px;"></i>
                    <span id="cart-counter"
                        style="position: absolute; top: -5px; right: -5px; background: var(--p-900); color: white; font-size: 10px; font-weight: 900; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid #fff;">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Page Title Panel -->
    <section class="py-24 bg-slate-50 border-b border-slate-100">
        <div class="container">
            <span class="label">Secure Review</span>
            <h1 class="section-title" style="margin:0;">Archive Selections</h1>
            <p class="section-subtitle" style="margin-top: 1.5rem; color: var(--s-400);">Finalize your acquisition
                details below.</p>
        </div>
    </section>

    <!-- Cart Layout -->
    <section class="py-24">
        <div class="container">
            <div class="dashboard-layout" style="grid-template-columns: 1fr 400px; gap: 4rem;">

                <!-- Items Feed -->
                <main>
                    <div id="cart-items-feed" class="grid gap-10">
                        <!-- Elite Item Template -->
                        <div class="p-20 text-center w-full col-span-full label">Syncing archive data...</div>
                    </div>
                </main>

                <!-- Sidebar Summary -->
                <aside class="dashboard-sidebar" style="position: sticky; top: 124px; padding: 3rem;">
                    <div class="space-y-10">
                        <section>
                            <h3 class="label">Total Acquisition</h3>
                            <div class="space-y-4 mt-6">
                                <div class="flex justify-between items-center">
                                    <span class="text-sm font-bold text-s-500">Subtotal</span>
                                    <span id="cart-subtotal" class="text-sm font-black text-s-950">₹ 0.00</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-sm font-bold text-s-500">Logistics</span>
                                    <span class="text-xs font-black text-p-900 uppercase">Complimentary</span>
                                </div>
                                <div style="height: 1px; background: var(--s-100); margin: 2rem 0;"></div>
                                <div class="flex justify-between items-center">
                                    <span class="text-xl font-black text-s-950">Total</span>
                                    <span id="cart-total" class="text-3xl font-black text-p-900">₹ 0.00</span>
                                </div>
                            </div>
                        </section>

                        <a href="checkout.html" class="btn btn-primary w-full"
                            style="height: 70px; font-size: 1.125rem;">Proceed to Settlement</a>

                        <div class="flex items-center justify-center gap-4 text-s-300">
                            <i data-lucide="shield-check" style="width: 16px;"></i>
                            <p class="label" style="font-size: 8px; margin: 0; opacity: 0.5;">TLS Encrypted Transaction
                            </p>
                        </div>
                    </div>
                </aside>

            </div>
        </div>
    </section>

    <!-- Elite Footer -->
    <footer>
        <div class="container mt-24 pt-8 border-t border-white/5 text-center">
            <p class="label" style="color: var(--s-600);">&copy; 2026 Storefront. Precision Built.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>

</html>
