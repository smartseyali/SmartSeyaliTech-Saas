<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive | Minimal Luxe</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body style="background: #fff;">

    <header id="main-header" class="scrolled">
        <div class="container flex justify-between items-center w-full">
            <div class="flex items-center gap-10">
                <nav class="flex gap-4">
                    <a href="index.html" class="nav-link">Home</a>
                </nav>
            </div>
            <a href="index.html" id="store-logo" class="brand-font">MUSE</a>
            <div class="flex items-center gap-6">
                <a href="profile.html" class="nav-link"><i data-lucide="user" style="width:18px;"></i></a>
                <a href="cart.html" class="nav-link" style="position: relative;">
                    <i data-lucide="shopping-bag" style="width:18px;"></i>
                    <span id="cart-counter"
                        style="position: absolute; top: -5px; right: -5px; background: #000; color: #fff; font-size: 9px; font-weight: 700; width: 15px; height: 15px; border-radius: 50%; display: none; align-items: center; justify-content: center;">0</span>
                </a>
            </div>
        </div>
    </header>

    <section style="padding: 100px 0; text-align: center;">
        <div class="container">
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">The Archive</h1>
            <p style="text-transform: uppercase; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-muted);">
                Curated essentials for a refined life</p>
        </div>
    </section>

    <section style="padding-bottom: 120px;">
        <div class="container">
            <div style="display: grid; grid-template-columns: 200px 1fr; gap: 4rem;">
                <aside>
                    <div style="position: sticky; top: 120px;">
                        <h3
                            style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.2em; border-bottom: 1px solid var(--border-soft); padding-bottom: 1rem; margin-bottom: 2rem;">
                            Filter</h3>
                        <div id="category-filter" class="flex flex-col gap-4">
                            <!-- Data via shop.js -->
                        </div>
                    </div>
                </aside>

                <main>
                    <div id="catalog-grid"
                        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 3rem;">
                        <div
                            style="padding: 100px; text-align: center; width: 100%; grid-column: 1/-1; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.5;">
                            Accessing Archive...</div>
                    </div>
                </main>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p style="font-size: 0.6rem; opacity: 0.4;">&copy; 2026 MUSE COLLECTIVE.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/shop.js"></script>
</body>

</html>
