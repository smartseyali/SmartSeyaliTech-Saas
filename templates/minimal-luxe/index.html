<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Luxe | Essential Elegance</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header id="main-header">
        <div class="container flex justify-between items-center w-full">
            <div class="flex items-center gap-10">
                <nav class="flex gap-4">
                    <a href="shop.html" class="nav-link">Catalog</a>
                </nav>
            </div>
            <a href="index.html" id="store-logo" class="brand-font">MUSE</a>
            <div class="flex items-center gap-6">
                <a href="profile.html" class="nav-link"><i data-lucide="user" style="width:18px;"></i></a>
                <a href="cart.html" class="nav-link" style="position: relative;">
                    <i data-lucide="shopping-bag" style="width:18px;"></i>
                    <span id="cart-counter"
                        style="position: absolute; top: -5px; right: -5px; background: #000; color: #fff; font-size: 9px; font-weight: 700; width: 15px; height: 15px; border-radius: 50%; display: none; align-items: center; justify-content: center;">0</span>
                </a>
            </div>
        </div>
    </header>

    <section class="hero-section text-center animate-fade">
        <div class="container">
            <h1 class="hero-title">Essential <br> <i>Collection</i></h1>
            <p
                style="margin-bottom: 3rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.7rem;">
                Transcending Trends. Defining Style.</p>
            <a href="shop.html" class="btn btn-primary">Shop Now</a>
        </div>
    </section>

    <section style="padding: 120px 0;">
        <div class="container">
            <div id="best-sellers-container"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem;">
                <!-- Data via home.js -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <h3 class="brand-font" style="font-size: 2.5rem; margin-bottom: 1rem;">MUSE</h3>
            <p
                style="text-transform: uppercase; font-size: 0.6rem; letter-spacing: 0.4em; color: var(--text-muted); margin-bottom: 4rem;">
                Curated for the modern minimalist</p>
            <div class="flex justify-center gap-10">
                <a href="shop.html" class="footer-link">The Archive</a>
                <a href="#" class="footer-link">Social</a>
                <a href="contact.html" class="footer-link">Reach Out</a>
            </div>
            <p style="margin-top: 6rem; font-size: 0.6rem; opacity: 0.4;">&copy; 2026 MUSE COLLECTIVE.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/home.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
            window.addEventListener('scroll', () => {
                const h = document.getElementById('main-header');
                if (window.scrollY > 50) h.classList.add('scrolled');
                else h.classList.remove('scrolled');
            });
        });
    </script>
</body>

</html>
