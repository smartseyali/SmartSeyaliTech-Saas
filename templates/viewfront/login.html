<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorized User | Premium Storefront</title>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-s-950" style="min-height: 100vh; display: flex; flex-direction: column;">

    <!-- Minimal Elite Header -->
    <header style="background: transparent; position: relative;">
        <div class="container flex items-center justify-between">
            <a href="index.html" class="brand-font" style="color: white; font-size: 1.8rem;">STORE</a>
            <a href="index.html" class="nav-link" style="color: var(--s-400);">Return to Store</a>
        </div>
    </header>

    <!-- Professional Auth Architecture -->
    <main class="flex-1 flex items-center justify-center py-20">
        <div class="container" style="max-width: 550px;">
            <div class="card p-16 animate-reveal"
                style="border-radius: var(--radius-xl); box-shadow: var(--shadow-float); border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); backdrop-filter: blur(40px);">

                <div class="text-center mb-16 space-y-6">
                    <div
                        class="w-24 h-24 bg-p-900 mx-auto flex items-center justify-center rounded-[32px] text-white shadow-2xl">
                        <i data-lucide="lock" style="width: 32px; height: 32px;"></i>
                    </div>
                    <h1 class="text-4xl font-black text-white" style="margin:0;">Authorized Access</h1>
                    <p class="label" style="color: var(--s-400); text-transform: none; font-size: 1rem;">Enter your
                        credentials to manage your archive selections.</p>
                </div>

                <form id="login-form" class="space-y-8">
                    <div class="space-y-4">
                        <label class="label" style="color: var(--p-400);">Archive Protocol ID (Email)</label>
                        <div class="relative">
                            <input type="email" id="email" class="input" placeholder="user@archive.com" required
                                style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: white;" />
                        </div>
                    </div>

                    <div class="space-y-4">
                        <label class="label" style="color: var(--p-400);">Passphrase Intelligence</label>
                        <div class="relative">
                            <input type="password" id="password" class="input" placeholder="••••••••" required
                                style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: white;" />
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-full h-20 shadow-2xl"
                        style="font-size: 1.1rem; border-radius: 20px;">
                        Authenticate Session
                    </button>

                    <div class="pt-8 border-t border-white/5 flex flex-col items-center gap-6">
                        <a href="signup.html" class="label"
                            style="color: var(--s-400); text-transform: none; opacity: 0.6; cursor: pointer;">Initialize
                            New Profile Archives</a>
                        <div class="flex items-center gap-4 text-s-600">
                            <i data-lucide="shield-check" style="width: 16px;"></i>
                            <span
                                style="font-size: 9px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase;">TLS
                                Secure Protocol</span>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <!-- Bottom Aesthetic -->
    <div style="height: 100px; opacity: 0.2; pointer-events: none;">
        <div class="hero-glow" style="width: 100vw; height: 100vw; bottom: -50vw; top: auto; right: 0;"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>

</html>
