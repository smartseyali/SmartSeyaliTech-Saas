<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart | BASIK FIT</title>
    <!-- Common Libs -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/cart.css">
</head>

<body>

    <div id="header-root"></div>

    <main class="cart-main container section">
        <header class="cart-title">
            <h1>Shopping Cart</h1>
            <p id="total-items-desc">0 items in your bag</p>
        </header>

        <div class="cart-grid">
            <!-- Left Side: Items -->
            <section class="cart-items-wrapper">
                <div id="cart-list" class="cart-list">
                    <!-- Items go here -->
                </div>

                <div class="cart-actions">
                    <a href="shop.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Continue
                        Shopping</a>
                    <button class="btn btn-outline" onclick="clearFullCart()">Clear Bag</button>
                </div>
            </section>

            <!-- Right Side: Order Summary -->
            <aside class="order-summary-sidebar">
                <div class="summary-card">
                    <h3>Order Summary</h3>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="summary-subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span class="free">Free</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (Estimated)</span>
                        <span id="summary-tax">$0.00</span>
                    </div>

                    <div class="coupon-section">
                        <input type="text" placeholder="Promo Code">
                        <button class="btn btn-dark">Apply</button>
                    </div>

                    <div class="summary-total">
                        <span>Total</span>
                        <span id="summary-total">$0.00</span>
                    </div>

                    <a href="checkout.html" class="btn btn-primary btn-full checkout-btn">Proceed to Checkout</a>

                    <div class="trust-badges">
                        <div class="badge-item"><i class="fa-solid fa-shield-halved"></i> <span>Secure Checkout</span>
                        </div>
                        <div class="badge-item"><i class="fa-solid fa-truck-fast"></i> <span>Free Fast Delivery</span>
                        </div>
                        <div class="badge-item"><i class="fa-solid fa-rotate-left"></i> <span>30-Day Returns</span>
                        </div>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Recently Viewed / Recommendations Placeholder -->
        <section class="recommendations">
            <h3>You Might Also Like</h3>
            <div id="rec-grid" class="product-grid"></div>
        </section>
    </main>

    <div id="footer-root"></div>

    <script src="assets/js/cart.js"></script>
    <script src="assets/js/layout.js"></script>
    <script type="module">
        import products from './assets/js/products.js';
        window.allProducts = products;

        function renderCartPage() {
            const cart = getCart();
            const list = document.getElementById('cart-list');
            list.innerHTML = '';

            if (cart.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <h2>Your bag is currently empty.</h2>
                        <a href="shop.html" class="btn btn-primary">Start Shopping</a>
                    </div>
                `;
                updateSummary(0);
                return;
            }

            cart.forEach(item => {
                const html = `
                    <div class="cart-item-row" data-id="${item.id}" data-size="${item.size}">
                        <div class="item-img" onclick="window.location.href='product.html?id=${item.id}'">
                            <img src="${item.image}" alt="${item.name}">
                        </div>
                        <div class="item-details">
                            <h4 onclick="window.location.href='product.html?id=${item.id}'">${item.name}</h4>
                            <div class="item-meta">
                                <span>Size: <strong>${item.size}</strong></span>
                                <span>Ref: #BASE-00${item.id}</span>
                            </div>
                            <div class="item-actions">
                                <button onclick="toggleWishlist(${item.id})"><i class="fa-regular fa-heart"></i> Move to Wishlist</button>
                                <button onclick="removeFromCart(${item.id}, '${item.size}')"><i class="fa-solid fa-trash-can"></i> Remove</button>
                            </div>
                        </div>
                        <div class="item-qty">
                            <button onclick="changeQty(${item.id}, '${item.size}', -1)">-</button>
                            <input type="number" value="${item.quantity}" readonly>
                            <button onclick="changeQty(${item.id}, '${item.size}', 1)">+</button>
                        </div>
                        <div class="item-price">
                            $${(item.price * item.quantity).toFixed(2)}
                        </div>
                    </div>
                `;
                list.insertAdjacentHTML('beforeend', html);
            });

            const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            updateSummary(subtotal, cart.length);
        }

        function updateSummary(subtotal, count) {
            const tax = subtotal * 0.08;
            const total = subtotal + tax;
            document.getElementById('summary-subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('summary-tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('summary-total').textContent = `$${total.toFixed(2)}`;
            document.getElementById('total-items-desc').textContent = `${count || 0} items in your bag`;
        }

        window.changeQty = (id, size, delta) => {
            let cart = getCart();
            const item = cart.find(i => i.id === id && i.size === size);
            if (item) {
                item.quantity += delta;
                if (item.quantity < 1) return;
                saveCart(cart);
                renderCartPage();
            }
        };

        window.clearFullCart = () => {
            if (confirm("Are you sure you want to empty your cart?")) {
                localStorage.removeItem('basik_store_cart');
                renderCartPage();
                updateCartCounts();
            }
        };

        window.renderCartPage = renderCartPage; // Make global for cart.js

        window.onload = () => {
            renderCartPage();
        };
    </script>
</body>

</html>
