<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .flex {
            display: flex;
        }

        .grid {
            display: grid;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .flex-col {
            flex-direction: column;
        }

        .gap-4 {
            gap: 1rem;
        }

        .gap-6 {
            gap: 1.5rem;
        }

        .gap-8 {
            gap: 2rem;
        }

        .gap-10 {
            gap: 2.5rem;
        }

        .p-4 {
            padding: 1rem;
        }

        .p-6 {
            padding: 1.5rem;
        }

        .py-12 {
            padding-top: 3rem;
            padding-bottom: 3rem;
        }

        .py-20 {
            padding-top: 5rem;
            padding-bottom: 5rem;
        }

        .mb-2 {
            margin-bottom: 0.5rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .mb-6 {
            margin-bottom: 1.5rem;
        }

        .text-slate-400 {
            color: #94a3b8;
        }

        .text-slate-800 {
            color: #1e293b;
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .text-lg {
            font-size: 1.125rem;
        }

        .text-3xl {
            font-size: 1.875rem;
        }

        .text-4xl {
            font-size: 2.25rem;
        }

        .font-bold {
            font-weight: 700;
        }

        .font-black {
            font-weight: 900;
        }

        .rounded-2xl {
            border-radius: 1rem;
        }

        .rounded-3xl {
            border-radius: 1.5rem;
        }

        .bg-white {
            background-color: white;
        }

        .bg-slate-50 {
            background-color: #f8fafc;
        }

        .bg-primary {
            background-color: var(--primary);
        }

        .shadow-lg {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .w-full {
            width: 100%;
        }

        .h-full {
            height: 100%;
        }

        .transition-all {
            transition: all 0.2s;
        }

        .aspect-square {
            aspect-ratio: 1 / 1;
        }

        .object-cover {
            object-fit: cover;
        }

        .product-image-container {
            position: relative;
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-white">

    <!-- Header -->
    <header>
        <div class="container flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" id="store-logo" class="brand-font text-2xl font-black text-slate-800"
                    style="text-decoration: none;">STORE</a>
                <nav class="flex gap-6">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="cart-btn p-2 text-slate-400 hover:text-slate-800 transition-all">
                    <i data-lucide="shopping-bag"></i>
                    <span class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Product Detail Section -->
    <section class="py-12 md:py-20">
        <div class="container">
            <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 4rem;">

                <!-- Image Slider/Static -->
                <div class="product-image-container aspect-square bg-slate-50 rounded-3xl overflow-hidden shadow-lg">
                    <img id="p-image" src="https://api.iconify.design/lucide:image.svg"
                        class="w-full h-full object-cover" />
                </div>

                <!-- Product Info -->
                <div class="flex flex-col justify-center">
                    <span id="p-category"
                        class="inline-block px-3 py-1 bg-slate-100 text-slate-500 text-xs font-bold uppercase rounded-full mb-4 w-fit">Category</span>
                    <h1 id="p-name" class="text-3xl md:text-5xl font-black text-slate-800 mb-4">Product Name</h1>
                    <div id="p-description" class="text-slate-400 text-lg mb-8 leading-relaxed">
                        Loading detailed description...
                    </div>

                    <div class="flex items-center gap-6 mb-10">
                        <span id="p-price" class="text-3xl font-black text-primary">₹ 0.00</span>
                        <div class="flex items-center gap-4 p-2 bg-slate-50 rounded-xl border border-slate-100">
                            <button id="qty-minus" class="p-2 hover:bg-white rounded-lg transition-all"><i
                                    data-lucide="minus" class="w-4 h-4"></i></button>
                            <span id="p-qty" class="font-bold px-4">1</span>
                            <button id="qty-plus" class="p-2 hover:bg-white rounded-lg transition-all"><i
                                    data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <button id="add-to-cart"
                        class="btn btn-primary h-16 rounded-2xl text-lg font-bold shadow-xl flex items-center justify-center gap-3">
                        <i data-lucide="shopping-cart"></i>
                        Add to Shopping Bag
                    </button>

                    <div class="mt-12 pt-12 border-t border-slate-100 grid grid-cols-2 gap-8">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-slate-50 rounded-xl text-primary"><i data-lucide="truck"></i></div>
                            <span class="text-xs font-bold text-slate-600">Pan India Delivery</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-slate-50 rounded-xl text-primary"><i data-lucide="shield-check"></i>
                            </div>
                            <span class="text-xs font-bold text-slate-600">Secure Checkout</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Same category logic -->
    <section class="py-20 bg-slate-50">
        <div class="container">
            <h2 class="text-2xl font-bold mb-10">You May Also Like</h2>
            <div id="related-products" class="grid"
                style="grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 2rem;">
                <!-- Filled via product.js -->
            </div>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/product.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setTimeout(() => lucide.createIcons(), 2000);
        });
    </script>
</body>

</html>
