<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Access | Premium Storefront</title>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50">

    <!-- Common Header -->
    <header id="main-header" class="scrolled">
        <div class="container flex items-center justify-between">
            <div class="flex items-center gap-10">
                <a href="index.html" id="store-logo" class="brand-font"
                    style="text-decoration: none; font-size: 1.5rem; color: var(--slate-900);">STORE</a>
                <nav class="flex gap-4 desktop-nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="nav-link" style="position: relative;" aria-label="Cart">
                    <i data-lucide="shopping-bag" style="width:20px; height:20px;"></i>
                    <span id="cart-counter" class="absolute"
                        style="top:-2px; right:-2px; background:var(--primary); color:white; font-size:9px; font-weight:800; min-width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white; display: none;">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="container py-24 flex items-center justify-center min-h-[85vh]">
        <div class="card p-12 max-w-lg w-full animate-reveal"
            style="box-shadow: var(--shadow-xl); border-radius: 40px;">

            <div class="text-center mb-10">
                <div
                    class="w-16 h-16 bg-primary rounded-[20px] mx-auto flex items-center justify-center text-white mb-6 shadow-lg">
                    <i data-lucide="lock" style="width:28px; height:28px;"></i>
                </div>
                <h1 id="auth-title" class="text-4xl font-black text-slate-900">Secure Access</h1>
                <p id="auth-subtitle" class="section-subtitle mt-2">Enter your credentials to manage your premium
                    account.</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-6">
                <div class="form-field">
                    <label class="label">Email Address</label>
                    <input type="email" id="email" class="input" placeholder="name@example.com" required />
                </div>
                <div class="form-field">
                    <label class="label">Password</label>
                    <input type="password" id="password" class="input" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary w-full"
                    style="height: 60px; font-size: 1.1rem; border-radius: 20px;">
                    Sign In Securely
                </button>
            </form>

            <!-- Signup Form (Hidden Initially) -->
            <form id="signup-form" class="space-y-6" style="display: none;">
                <div class="form-field">
                    <label class="label">Full Legal Name</label>
                    <input type="text" id="full_name" class="input" placeholder="John Doe" />
                </div>
                <div class="form-field">
                    <label class="label">Email Address</label>
                    <input type="email" id="signup-email" class="input" placeholder="name@example.com" required />
                </div>
                <div class="form-field">
                    <label class="label">Choose Password</label>
                    <input type="password" id="signup-password" class="input" placeholder="Minimum 6 characters"
                        required minlength="6" />
                </div>
                <button type="submit" class="btn btn-primary w-full"
                    style="height: 60px; font-size: 1.1rem; border-radius: 20px;">
                    Create Premium Account
                </button>
            </form>

            <div class="text-center mt-8 pt-8 border-t border-slate-50">
                <button id="toggle-auth" class="btn btn-ghost" style="font-weight: 800; color: var(--primary);">
                    No account yet? Register Here
                </button>
            </div>
        </div>
    </main>

    <!-- Common Footer -->
    <footer
        style="background: var(--slate-900); color: white; padding: 40px 0; text-align: center; border-radius: 40px 40px 0 0;">
        <p class="label" style="color: var(--slate-400);">&copy; 2026 Storefront. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                lucide.createIcons();
                setTimeout(() => lucide.createIcons(), 1500);
            }
        });
    </script>
</body>

</html>
