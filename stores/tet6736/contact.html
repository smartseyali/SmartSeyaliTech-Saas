<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Storefront</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-white">
    <!-- Header -->
    <header>
        <div class="container flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" id="store-logo" class="brand-font text-2xl font-black text-slate-800"
                    style="text-decoration: none;">STORE</a>
                <nav class="flex gap-6">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="contact.html" class="nav-link active">Contact</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="cart-btn p-2 text-slate-400 hover:text-slate-800 transition-all">
                    <i data-lucide="shopping-bag"></i>
                    <span class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="container py-24">
        <div class="grid md:grid-cols-2 gap-16 max-w-6xl mx-auto items-center">

            <div class="space-y-12">
                <div class="space-y-4">
                    <span
                        class="bg-secondary/10 text-secondary px-4 py-1.5 rounded-full text-xs font-black uppercase">Get
                        in touch</span>
                    <h1 class="text-5xl font-black text-slate-800">We're Here to Help.</h1>
                    <p class="text-xl text-slate-400">Have a question or feedback? We’d love to hear from you.</p>
                </div>

                <div class="space-y-8">
                    <div class="flex items-center gap-6 p-6 bg-slate-50 rounded-3xl group">
                        <div
                            class="w-16 h-16 bg-white shadow-sm flex items-center justify-center rounded-2xl text-primary group-hover:bg-primary group-hover:text-white transition-all">
                            <i data-lucide="mail"></i>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Email Us</p>
                            <p class="text-lg font-bold text-slate-800">support@store.com</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-6 p-6 bg-slate-50 rounded-3xl group">
                        <div
                            class="w-16 h-16 bg-white shadow-sm flex items-center justify-center rounded-2xl text-primary group-hover:bg-primary group-hover:text-white transition-all">
                            <i data-lucide="phone"></i>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Call Us</p>
                            <p class="text-lg font-bold text-slate-800">+91 000 000 0000</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-10 rounded-3xl border border-slate-100 shadow-2xl space-y-8">
                <h3 class="text-2xl font-black text-slate-800">Send a Message</h3>
                <form class="space-y-6" onsubmit="event.preventDefault(); alert('Message sent!'); location.reload();">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase">Full Name</label>
                        <input type="text" class="form-input" placeholder="John Doe" required />
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase">Email Address</label>
                        <input type="email" class="form-input" placeholder="john@example.com" required />
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase">Your Message</label>
                        <textarea class="form-input min-h-[140px]" placeholder="Type your message here..."
                            required></textarea>
                    </div>
                    <button type="submit"
                        class="btn btn-primary w-full h-14 justify-center text-md font-bold shadow-xl">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-16 bg-white border-t border-slate-100">
        <div class="container text-center text-xs text-slate-400">
            &copy; 2024 Storefront. All rights reserved. Powered by Ecommerce SaaS.
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>

</html>
