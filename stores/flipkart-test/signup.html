<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .auth-card {
            max-width: 420px;
            margin: 60px auto;
            background: white;
            padding: 32px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .auth-card h2 {
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color .25s;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .btn-auth {
            width: 100%;
            margin-top: 10px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
        }

        #error-box {
            color: var(--danger);
            background: rgba(231, 76, 60, 0.08);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        #success-box {
            color: var(--success);
            background: rgba(56, 142, 60, 0.08);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
    </style>
</head>

<body style="background:var(--bg)">
    <header id="main-header"></header>

    <main class="container">
        <div class="auth-card fade-in">
            <h2>Create Account</h2>

            <div id="error-box"></div>
            <div id="success-box"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="full-name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-auth" id="submit-btn text">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <script type="module">
        import ui from './js/ui.js';
        import auth from './js/auth.js';

        async function init() {
            await ui.init();

            const form = document.getElementById('signup-form');
            const errBox = document.getElementById('error-box');
            const successBox = document.getElementById('success-box');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errBox.style.display = 'none';
                successBox.style.display = 'none';

                const name = document.getElementById('full-name').value;
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;

                submitBtn.disabled = true;
                submitBtn.innerText = 'Creating Account...';

                try {
                    await auth.signUp(email, pass, name);
                    successBox.innerText = 'Account created! Please check your email for verification (or just login if email verification is disabled).';
                    successBox.style.display = 'block';
                    form.reset();
                    setTimeout(() => { location.href = 'login.html'; }, 3000);
                } catch (err) {
                    errBox.innerText = err.message || 'Signup failed. Please try again.';
                    errBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Create Account';
                }
            });
        }
        init();
    </script>
</body>

</html>
