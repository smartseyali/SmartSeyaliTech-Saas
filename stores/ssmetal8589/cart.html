<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .cart-page {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 24px;
            margin: 24px 0;
            align-items: start;
        }

        .cart-panel {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .cart-panel h2 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--bg);
        }

        .cart-row {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--bg);
            align-items: center;
        }

        .cart-row:last-child {
            border: none;
        }

        .cart-row img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px;
        }

        .item-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .item-variant {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .item-price {
            font-weight: 800;
            color: var(--primary);
        }

        .qty-ctrl {
            display: flex;
            align-items: center;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            width: fit-content;
            margin-top: 8px;
        }

        .qty-ctrl button {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg);
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: background .15s;
        }

        .qty-ctrl button:hover {
            background: var(--border);
        }

        .qty-ctrl span {
            padding: 0 12px;
            font-weight: 700;
            font-size: 14px;
        }

        .remove-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            transition: color .2s;
        }

        .remove-btn:hover {
            color: var(--danger);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
            border-bottom: 1px solid var(--bg);
        }

        .summary-row.total {
            font-size: 16px;
            font-weight: 800;
            border: none;
            padding-top: 14px;
        }

        .empty-cart {
            text-align: center;
            padding: 60px 0;
        }

        .empty-cart svg {
            margin: 0 auto 16px;
            display: block;
            opacity: .2;
        }

        .empty-cart h3 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .empty-cart p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        @media(max-width:768px) {
            .cart-page {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header id="main-header"></header>

    <main class="container">
        <div class="cart-page" id="cart-page">
            <!-- Rendered by JS -->
        </div>
    </main>

    <script type="module">
        import ui from './js/ui.js';
        import { cartStore } from './js/cart.js';
        import { mapper } from './js/mapper.js';

        try { await ui.init(); } catch (e) { }

        function render() {
            const cart = cartStore.get();
            const page = document.getElementById('cart-page');

            if (!cart.length) {
                page.innerHTML = `
                    <div class="cart-panel" style="grid-column:1/-1">
                        <div class="empty-cart">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                            <h3>Your cart is empty</h3>
                            <p>Looks like you haven't added anything to your cart yet.</p>
                            <a href="shop.html" class="btn btn-primary">Start Shopping</a>
                        </div>
                    </div>`;
                return;
            }

            const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);

            page.innerHTML = `
                <!-- Cart Items -->
                <div class="cart-panel fade-in">
                    <h2>My Cart <span style="font-size:14px;font-weight:500;color:var(--text-muted)">(${cart.length} item${cart.length > 1 ? 's' : ''})</span></h2>
                    <div id="cart-items">
                        ${cart.map((item, idx) => `
                            <div class="cart-row">
                                <img src="${item.image || ''}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/80'">
                                <div>
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-price">${mapper.formatCurrency(item.price)}</div>
                                    <div class="qty-ctrl">
                                        <button onclick="updateQty(${idx}, -1)">−</button>
                                        <span>${item.quantity}</span>
                                        <button onclick="updateQty(${idx}, 1)">+</button>
                                    </div>
                                </div>
                                <button class="remove-btn" onclick="removeItem(${idx})" title="Remove">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="cart-panel fade-in">
                    <h2>Order Summary</h2>
                    <div class="summary-row"><span>Subtotal</span><span>${mapper.formatCurrency(subtotal)}</span></div>
                    <div class="summary-row"><span>Shipping</span><span style="color:var(--success)">Calculated at checkout</span></div>
                    <div class="summary-row"><span>Discount</span><span id="discount-shown">—</span></div>
                    <div class="summary-row total"><span>Total</span><span>${mapper.formatCurrency(subtotal)}</span></div>
                    <a href="checkout.html" class="btn btn-primary" style="width:100%;display:block;text-align:center;margin-top:20px">
                        Proceed to Checkout →
                    </a>
                    <a href="shop.html" style="display:block;text-align:center;margin-top:12px;font-size:13px;color:var(--text-muted);font-weight:600">
                        ← Continue Shopping
                    </a>
                </div>
            `;
        }

        window.updateQty = (idx, delta) => {
            const cart = cartStore.get();
            const item = cart[idx];
            const newQty = item.quantity + delta;
            cartStore.updateQuantity(item.product_id, item.variant_id, newQty);
            render();
        };

        window.removeItem = (idx) => {
            const item = cartStore.get()[idx];
            cartStore.removeItem(item.product_id, item.variant_id);
            render();
        };

        render();
    </script>
</body>

</html>
