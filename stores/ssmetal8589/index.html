<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ── Popular Categories ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 20px;
            font-weight: 800;
        }

        .section-header a {
            font-size: 13px;
            color: var(--primary);
            font-weight: 700;
            padding: 6px 14px;
            border: 1.5px solid var(--primary);
            border-radius: 99px;
            transition: all .2s;
        }

        .section-header a:hover {
            background: var(--primary);
            color: white;
        }

        .cat-circles {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 4px 0 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .cat-circles::-webkit-scrollbar {
            display: none;
        }

        .cat-bubble {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            cursor: pointer;
            width: 90px;
        }

        .cat-bubble:hover .cat-img-wrap {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .15);
        }

        .cat-bubble:hover .cat-label {
            color: var(--primary);
        }

        .cat-img-wrap {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--border);
            background: var(--bg);
            transition: all .25s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }

        .cat-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cat-img-wrap .cat-emoji {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: rgba(40, 116, 240, .07);
        }

        .cat-label {
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            color: var(--text);
            line-height: 1.3;
            transition: color .2s;
            max-width: 90px;
        }

        /* ── Offers strip ── */
        .offers-strip {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 0 4px;
            scrollbar-width: none;
            margin: 8px 0 24px;
        }

        .offer-pill {
            flex-shrink: 0;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: transform .2s;
        }

        .offer-pill:hover {
            transform: scale(1.03);
        }

        .offer-pill .off {
            font-size: 16px;
            display: block;
        }
    </style>
</head>

<body>
    <header id="main-header"></header>

    <main class="container">
        <!-- Hero Slider -->
        <section id="hero-slider" class="hero-slider" style="margin-top:20px"></section>

        <!-- Popular Categories circles -->
        <section class="section" style="margin-top:28px">
            <div class="section-header">
                <h2>Popular Categories</h2>
                <a href="shop.html">View All</a>
            </div>
            <div class="cat-circles" id="cat-circles">
                <!-- Skeletons (Hardcoded HTML so browser doesn't show JS code as text) -->
                <div class="cat-bubble">
                    <div class="cat-img-wrap skeleton" style="border-radius:50%"></div>
                    <div class="skeleton" style="height:12px;width:60px;border-radius:4px;margin-top:4px"></div>
                </div>
                <div class="cat-bubble">
                    <div class="cat-img-wrap skeleton" style="border-radius:50%"></div>
                    <div class="skeleton" style="height:12px;width:60px;border-radius:4px;margin-top:4px"></div>
                </div>
                <div class="cat-bubble">
                    <div class="cat-img-wrap skeleton" style="border-radius:50%"></div>
                    <div class="skeleton" style="height:12px;width:60px;border-radius:4px;margin-top:4px"></div>
                </div>
                <div class="cat-bubble">
                    <div class="cat-img-wrap skeleton" style="border-radius:50%"></div>
                    <div class="skeleton" style="height:12px;width:60px;border-radius:4px;margin-top:4px"></div>
                </div>
                <div class="cat-bubble">
                    <div class="cat-img-wrap skeleton" style="border-radius:50%"></div>
                    <div class="skeleton" style="height:12px;width:60px;border-radius:4px;margin-top:4px"></div>
                </div>
            </div>
        </section>

        <!-- Active Offers / Coupons strip -->
        <div id="offers-strip-wrap" style="display:none">
            <div class="offers-strip" id="offers-strip"></div>
        </div>

        <!-- Featured Products -->
        <section class="section">
            <div class="section-header">
                <h2>Featured Products</h2>
                <a href="shop.html?featured=1">View All</a>
            </div>
            <div id="featured-products" class="product-grid"></div>
        </section>

        <!-- Best Sellers -->
        <section class="section">
            <div class="section-header">
                <h2>Best Sellers</h2>
                <a href="shop.html?bestseller=1">View All</a>
            </div>
            <div id="best-sellers" class="product-grid"></div>
        </section>
    </main>

    <script type="module">
        import ui from './js/ui.js';
        import api from './js/api.js';
        import { mapper } from './js/mapper.js';

        async function init() {
            try { await ui.init(); } catch (e) { console.warn('ui.init:', e); }

            // ── Hero Banners ──────────────────────────────────────
            try {
                const banners = await api.getBanners();
                const slider = document.getElementById('hero-slider');
                if (banners.length) {
                    slider.innerHTML = banners.map((b, i) => `
                        <div class="slide ${i === 0 ? 'active' : ''}">
                            <img src="${b.image_url}" alt="${b.title || 'Banner'}" style="width:100%;border-radius:12px;object-fit:cover;max-height:360px">
                            ${b.title ? `<div class="slide-caption"><h2>${b.title}</h2><p>${b.subtitle || ''}</p></div>` : ''}
                        </div>
                    `).join('');
                    // Auto-play slider
                    let current = 0;
                    const slides = slider.querySelectorAll('.slide');
                    if (slides.length > 1) {
                        const interval = setInterval(() => {
                            if (!slides[current]) return clearInterval(interval);
                            slides[current].classList.remove('active');
                            current = (current + 1) % slides.length;
                            slides[current].classList.add('active');
                        }, 3500);
                    }
                } else {
                    slider.style.display = 'none';
                }
            } catch (e) { document.getElementById('hero-slider').style.display = 'none'; }

            // ── Popular Categories ────────────────────────────────
            try {
                const cats = await api.getCategories();
                const circles = document.getElementById('cat-circles');
                if (cats.length) {
                    circles.innerHTML = cats.map(cat => {
                        const thumb = cat.image_url
                            ? `<img src="${cat.image_url}" alt="${cat.name}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=cat-emoji>🏷️</div>'">`
                            : `<div class="cat-emoji">🏷️</div>`;
                        return `
                            <div class="cat-bubble" onclick="location.href='category.html?id=${cat.id}'">
                                <div class="cat-img-wrap">${thumb}</div>
                                <span class="cat-label">${cat.name}</span>
                            </div>`;
                    }).join('');
                } else {
                    document.querySelector('.section:has(#cat-circles)')?.remove();
                }
            } catch (e) {
                console.warn('Categories load error:', e);
                document.getElementById('cat-circles').innerHTML = '';
            }

            // ── Active Offers strip ───────────────────────────────
            try {
                const offers = await api.getActiveOffers?.();
                if (offers?.length) {
                    const strip = document.getElementById('offers-strip');
                    strip.innerHTML = offers.map(o => `
                        <div class="offer-pill" onclick="location.href='shop.html'">
                            <span class="off">${o.discount_type === 'percentage' ? `${o.discount_value}% OFF` : `₹${o.discount_value} OFF`}</span>
                            ${o.title || o.badge_label || 'Special Offer'}
                        </div>`).join('');
                    document.getElementById('offers-strip-wrap').style.display = 'block';
                }
            } catch (e) { console.warn('Offers load error:', e); }

            // ── Featured Products ─────────────────────────────────
            try {
                const featured = await api.getProducts({ is_featured: true });
                document.getElementById('featured-products').innerHTML =
                    featured.length
                        ? featured.map(p => renderCard(p)).join('')
                        : '<p class="empty-msg" style="grid-column:1/-1">No featured products yet.</p>';
            } catch (e) { document.getElementById('featured-products').innerHTML = '<p class="empty-msg" style="grid-column:1/-1">Failed to load.</p>'; }

            // ── Best Sellers ──────────────────────────────────────
            try {
                const best = await api.getProducts({ is_best_seller: true });
                document.getElementById('best-sellers').innerHTML =
                    best.length
                        ? best.map(p => renderCard(p)).join('')
                        : '<p class="empty-msg" style="grid-column:1/-1">No best sellers yet.</p>';
            } catch (e) { document.getElementById('best-sellers').innerHTML = '<p class="empty-msg" style="grid-column:1/-1">Failed to load.</p>'; }
        }

        function renderCard(p) {
            const m = mapper.mapProduct(p);
            return `
                <div class="product-card fade-in" onclick="location.href='product.html?id=${m.id}'">
                    ${m.discountLabel ? `<span class="offer-label">${m.discountLabel}</span>` : ''}
                    <img src="${m.image}" class="product-image" alt="${m.name}" loading="lazy"
                        onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'">
                    <h3 class="product-title">${m.name}</h3>
                    <div class="product-price-row">
                        <span class="current-price">${mapper.formatCurrency(m.price)}</span>
                        ${m.comparePrice ? `<span class="compare-price">${mapper.formatCurrency(m.comparePrice)}</span>` : ''}
                    </div>
                </div>`;
        }

        init();
    </script>
</body>

</html>
