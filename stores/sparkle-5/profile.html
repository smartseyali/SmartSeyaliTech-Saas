<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .profile-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 24px;
            margin: 24px 0;
            align-items: start;
        }

        .profile-sidebar {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .avatar {
            width: 72px;
            height: 72px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin: 0 auto 12px;
        }

        .user-name {
            text-align: center;
            font-weight: 800;
            font-size: 16px;
        }

        .user-email {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            color: var(--text);
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(40, 116, 240, .08);
            color: var(--primary);
        }

        .panel {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .panel h2 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .order-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            transition: box-shadow .2s;
        }

        .order-card:hover {
            box-shadow: var(--shadow);
        }

        .order-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .order-id {
            font-weight: 800;
            font-size: 14px;
            color: var(--primary);
        }

        .order-date {
            font-size: 12px;
            color: var(--text-muted);
        }

        .order-total {
            font-weight: 800;
            font-size: 16px;
        }

        .order-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .s-pending {
            background: #fef3c7;
            color: #b45309
        }

        .s-confirmed {
            background: #d1fae5;
            color: #065f46
        }

        .s-shipped {
            background: #dbeafe;
            color: #1e40af
        }

        .s-delivered {
            background: #dcfce7;
            color: #166534
        }

        .s-cancelled {
            background: #fee2e2;
            color: #b91c1c
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 4px;
        }

        .fg label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-muted);
        }

        .fi {
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border .2s;
        }

        .fi:focus {
            border-color: var(--primary);
        }

        @media(max-width:768px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header id="main-header"></header>
    <main class="container">
        <div class="profile-grid">
            <!-- Sidebar -->
            <div class="profile-sidebar fade-in">
                <div class="avatar" id="user-avatar">?</div>
                <div class="user-name" id="user-name">Loading...</div>
                <div class="user-email" id="user-email"></div>
                <nav class="sidebar-nav">
                    <div class="nav-item active" onclick="showTab('orders', this)">📦 My Orders</div>
                    <div class="nav-item" onclick="showTab('profile', this)">👤 Profile</div>
                    <div class="nav-item" onclick="showTab('refunds', this)">↩️ Refunds</div>
                    <div class="nav-item" style="color:var(--danger)" onclick="doLogout()">🚪 Logout</div>
                </nav>
            </div>

            <!-- Content area -->
            <div class="panel fade-in" id="profile-panel">
                <div style="text-align:center;padding:40px;color:var(--text-muted)">Loading...</div>
            </div>
        </div>
    </main>

    <script type="module">
        import ui from './js/ui.js';
        import api from './js/api.js';
        import auth from './js/auth.js';
        import { mapper } from './js/mapper.js';

        try { await ui.init(); } catch (e) { }

        const session = await auth.requireAuth();
        if (!session) return;

        const user = session.user;
        const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'User';
        const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

        document.getElementById('user-avatar').textContent = initials;
        document.getElementById('user-name').textContent = name;
        document.getElementById('user-email').textContent = user.email;

        window.showTab = (tab, el) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if (tab === 'orders') renderOrders();
            if (tab === 'profile') renderProfileForm();
            if (tab === 'refunds') renderRefunds();
        };

        window.doLogout = async () => {
            if (confirm('Are you sure you want to logout?')) await auth.signOut();
        };

        // ── Orders ─────────────────────────────────────────────
        async function renderOrders() {
            const panel = document.getElementById('profile-panel');
            panel.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">Loading orders...</div>';
            try {
                const orders = await api.getMyOrders(user.id);
                panel.innerHTML = `
                    <h2>My Orders</h2>
                    ${orders.length ? orders.map(o => `
                        <div class="order-card" onclick="location.href='order-tracking.html?id=${o.id}'">
                            <div class="order-head">
                                <div>
                                    <div class="order-id">#${o.order_number || o.id?.slice(0, 8)?.toUpperCase()}</div>
                                    <div class="order-date">${new Date(o.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                                </div>
                                <span class="order-status s-${o.status?.toLowerCase()}">${o.status || 'Pending'}</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <span style="font-size:13px;color:var(--text-muted)">Payment: ${o.payment_status || '—'}</span>
                                <span class="order-total">${mapper.formatCurrency(o.grand_total || 0)}</span>
                            </div>
                        </div>
                    `).join('') : '<p style="text-align:center;padding:40px;color:var(--text-muted)">No orders yet. <a href="shop.html" style="color:var(--primary);font-weight:700">Start shopping →</a></p>'}
                `;
            } catch (e) {
                panel.innerHTML = '<p style="padding:40px;color:var(--text-muted)">Failed to load orders.</p>';
            }
        }

        // ── Profile form ───────────────────────────────────────
        function renderProfileForm() {
            document.getElementById('profile-panel').innerHTML = `
                <h2>My Profile</h2>
                <div class="form-grid">
                    <div class="fg" style="grid-column:1/-1"><label>Full Name</label><input class="fi" id="pf-name" value="${name}"></div>
                    <div class="fg"><label>Email</label><input class="fi" value="${user.email}" disabled style="opacity:.6"></div>
                    <div class="fg"><label>New Password</label><input class="fi" id="pf-pass" type="password" placeholder="Leave blank to keep current"></div>
                </div>
                <button class="btn btn-primary" style="margin-top:16px" onclick="saveProfile()">Save Changes</button>
                <div id="pf-msg" style="margin-top:12px;font-size:13px"></div>
            `;
        }

        window.saveProfile = async () => {
            const msgEl = document.getElementById('pf-msg');
            const updates = {};
            const newPass = document.getElementById('pf-pass').value;
            if (newPass && newPass.length < 6) return msgEl.innerHTML = '<span style="color:var(--danger)">Password must be at least 6 characters.</span>';
            if (newPass) {
                try { await auth.updatePassword(newPass); } catch (e) { return msgEl.innerHTML = `<span style="color:var(--danger)">${e.message}</span>`; }
            }
            msgEl.innerHTML = '<span style="color:var(--success)">✅ Profile updated!</span>';
        };

        // ── Refunds ────────────────────────────────────────────
        async function renderRefunds() {
            const panel = document.getElementById('profile-panel');
            panel.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">Loading refunds...</div>';
            try {
                const { data: refunds } = await (await import('./js/supabaseClient.js')).supabase
                    .from('refunds')
                    .select('id, amount, reason, status, created_at, order_id')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });

                panel.innerHTML = `
                    <h2>Refund Requests</h2>
                    ${refunds?.length ? refunds.map(r => `
                        <div class="order-card">
                            <div class="order-head">
                                <div>
                                    <div class="order-id">Refund #${String(r.id)}</div>
                                    <div class="order-date">${new Date(r.created_at).toLocaleDateString('en-IN')}</div>
                                </div>
                                <span class="order-status s-${r.status}">${r.status || 'Requested'}</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;margin-top:8px">
                                <span style="font-size:13px;color:var(--text-muted)">${r.reason || '—'}</span>
                                <span style="font-weight:800">${mapper.formatCurrency(r.amount || 0)}</span>
                            </div>
                        </div>
                    `).join('') : '<p style="text-align:center;padding:40px;color:var(--text-muted)">No refund requests.</p>'}
                `;
            } catch (e) {
                panel.innerHTML = '<p style="padding:40px;color:var(--text-muted)">Failed to load refunds.</p>';
            }
        }

        // Show orders by default
        renderOrders();
    </script>
</body>

</html>
