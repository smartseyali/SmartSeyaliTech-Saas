<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .auth-card {
            max-width: 420px;
            margin: 80px auto;
            background: white;
            padding: 32px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .auth-card h2 {
            margin-bottom: 12px;
            text-align: center;
        }

        .auth-card p {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color .25s;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .btn-auth {
            width: 100%;
            margin-top: 10px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
        }

        #error-box {
            color: var(--danger);
            background: rgba(231, 76, 60, 0.08);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        #success-box {
            color: var(--success);
            background: rgba(56, 142, 60, 0.08);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
    </style>
</head>

<body style="background:var(--bg)">
    <header id="main-header"></header>

    <main class="container">
        <div class="auth-card fade-in">
            <div id="reset-request-section">
                <h2>Forgot Password?</h2>
                <p>No worries! Enter your email and we'll send you a reset link.</p>

                <div id="error-box"></div>
                <div id="success-box"></div>

                <form id="forgot-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="name@email.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-auth" id="submit-btn">Send Reset Link</button>
                </form>
            </div>

            <div id="update-password-section" style="display:none">
                <h2>New Password</h2>
                <p>Please enter your new password below.</p>

                <div id="update-error-box" class="error-msg"
                    style="display:none; color:var(--danger); margin-bottom:15px"></div>

                <form id="update-form">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="new-password" placeholder="••••••••" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary btn-auth" id="update-btn">Update Password</button>
                </form>
            </div>

            <div class="auth-footer">
                Remember your password? <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <script type="module">
        import ui from './js/ui.js';
        import auth from './js/auth.js';

        async function init() {
            await ui.init();

            const urlParams = new URLSearchParams(window.location.search);
            const isResetMode = urlParams.get('mode') === 'reset' || window.location.hash.includes('type=recovery');

            if (isResetMode) {
                document.getElementById('reset-request-section').style.display = 'none';
                document.getElementById('update-password-section').style.display = 'block';
            }

            // ── Request Reset Link ──────────────────────────────────
            const forgotForm = document.getElementById('forgot-form');
            forgotForm?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const btn = document.getElementById('submit-btn');
                const errBox = document.getElementById('error-box');
                const succBox = document.getElementById('success-box');

                btn.disabled = true;
                btn.innerText = 'Sending...';
                errBox.style.display = 'none';

                try {
                    await auth.forgotPassword(email);
                    succBox.innerText = 'Reset link sent! Check your email inbox.';
                    succBox.style.display = 'block';
                    forgotForm.style.display = 'none';
                } catch (err) {
                    errBox.innerText = err.message || 'Failed to send reset link.';
                    errBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Send Reset Link';
                }
            });

            // ── Update Password ─────────────────────────────────────
            const updateForm = document.getElementById('update-form');
            updateForm?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const pass = document.getElementById('new-password').value;
                const btn = document.getElementById('update-btn');
                const errBox = document.getElementById('update-error-box');

                btn.disabled = true;
                btn.innerText = 'Updating...';

                try {
                    await auth.updatePassword(pass);
                    alert('Password updated successfully! Redirecting to login...');
                    location.href = 'login.html';
                } catch (err) {
                    errBox.innerText = err.message || 'Update failed.';
                    errBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Update Password';
                }
            });
        }
        init();
    </script>
</body>

</html>
