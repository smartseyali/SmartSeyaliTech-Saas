<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers & Deals</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .offer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }

        .offer-card {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform .3s, box-shadow .3s;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .offer-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .offer-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f8f9fa;
        }

        .offer-content {
            padding: 24px;
            flex: 1;
        }

        .offer-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--accent);
            color: white;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .offer-card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .offer-card p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .coupon-box {
            background: #f1f3f6;
            border: 2px dashed #ccc;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            font-weight: 800;
            color: var(--primary);
            font-size: 15px;
            cursor: pointer;
            transition: all .2s;
        }

        .coupon-box:hover {
            background: #e8ebf0;
            border-color: var(--primary);
        }

        .expiry {
            font-size: 11px;
            color: #a4a4a4;
            margin-top: 12px;
            text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <header id="main-header"></header>

    <main class="container">
        <section class="section" style="margin-top: 32px; background: none; box-shadow: none; padding: 0;">
            <div style="text-align: center; margin-bottom: 40px" class="fade-in">
                <h1 style="font-size: 32px; font-weight: 800; color: var(--text)">Offer Zones</h1>
                <p style="color: var(--text-muted); margin-top: 8px">Exciting deals and exclusive coupons just for you
                </p>
            </div>

            <div id="offers-container" class="offer-grid">
                <!-- Skeletons -->
                ${Array(4).fill('<div class="offer-card skeleton" style="height:350px"></div>').join('')}
            </div>
        </section>
    </main>

    <script type="module">
        import ui from './js/ui.js';
        import api from './js/api.js';

        async function init() {
            await ui.init();

            const container = document.getElementById('offers-container');

            try {
                // Fetch both Offers and Coupons
                const [offers, coupons] = await Promise.all([
                    api.getActiveOffers(),
                    api.getCoupons ? api.getCoupons() : []
                ]);

                if (!offers.length && !coupons.length) {
                    container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px 0;"><p style="font-size: 18px; color: #999">No active offers at the moment. Keep checking!</p></div>';
                    return;
                }

                let html = '';

                // Render Marketing Offers
                offers.forEach(o => {
                    const discount = o.discount_type === 'percentage' ? `${o.discount_value}% OFF` : `₹${o.discount_value} OFF`;
                    html += `
                        <div class="offer-card fade-in">
                            <img src="${o.image_url || 'https://via.placeholder.com/400x200?text=Special+Offer'}" class="offer-img" alt="${o.title}">
                            <div class="offer-badge">${o.badge_label || discount}</div>
                            <div class="offer-content">
                                <h3>${o.title}</h3>
                                <p>${o.description || 'Special seasonal discount on select categories. Limited time offer.'}</p>
                                <a href="shop.html" class="btn btn-primary" style="width: 100%">Shop Now</a>
                                <div class="expiry">Ends on: ${new Date(o.ends_at).toLocaleDateString()}</div>
                            </div>
                        </div>
                    `;
                });

                // Render Coupon Codes
                coupons.forEach(c => {
                    const discount = c.type === 'percentage' ? `${c.value}% OFF` : `₹${c.value} OFF`;
                    html += `
                        <div class="offer-card fade-in">
                             <div style="height: 140px; background: linear-gradient(135deg, #2874f0 0%, #1a5dc4 100%); display:flex; align-items:center; justify-content:center; color:white; font-size:40px; font-weight:800">${discount}</div>
                            <div class="offer-badge">COUPON</div>
                            <div class="offer-content">
                                <h3>${c.description || 'Extra Savings'}</h3>
                                <p>Get ${discount} on orders above ₹${c.min_order_amount || 0}. Use the code below at checkout.</p>
                                <div class="coupon-box" onclick="copyCode('${c.code}')">CODE: ${c.code}</div>
                                <div class="expiry">Valid until: ${new Date(c.valid_until).toLocaleDateString()}</div>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: red">Failed to load offers. Please refresh.</p>';
            }
        }

        window.copyCode = (code) => {
            navigator.clipboard.writeText(code);
            alert('Coupon code ' + code + ' copied to clipboard!');
        };

        init();
    </script>
</body>

</html>
