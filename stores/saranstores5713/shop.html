<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .shop-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 24px;
            margin: 24px 0;
        }

        .filter-panel {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .filter-panel h3 {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 16px;
            color: var(--text);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 8px;
        }

        .filter-panel a {
            display: block;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all .2s;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .filter-panel a:hover,
        .filter-panel a.active {
            background: rgba(40, 116, 240, .08);
            color: var(--primary);
        }

        .shop-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            background: white;
            padding: 16px 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .shop-header h2 {
            font-size: 18px;
            font-weight: 800;
        }

        .result-count {
            font-size: 13px;
            color: var(--text-muted);
            background: var(--bg);
            padding: 4px 12px;
            border-radius: 99px;
            font-weight: 600;
        }

        @media(max-width:768px) {
            .shop-layout {
                grid-template-columns: 1fr;
            }

            .filter-panel {
                display: none;
            }
        }
    </style>
</head>

<body>
    <header id="main-header"></header>

    <main class="container">
        <div class="shop-layout">
            <!-- Sidebar filters -->
            <aside class="filter-panel">
                <h3>Categories</h3>
                <div id="sidebar-categories">
                    <a onclick="window.filterBy(null)" class="active">All Products</a>
                    <!-- Skeletons -->
                    <div class="skeleton" style="height:32px; width:100%; border-radius:8px; margin-top:8px"></div>
                    <div class="skeleton" style="height:32px; width:100%; border-radius:8px; margin-top:8px"></div>
                    <div class="skeleton" style="height:32px; width:100%; border-radius:8px; margin-top:8px"></div>
                </div>
            </aside>

            <!-- Product grid -->
            <div>
                <div class="shop-header">
                    <h2 id="shop-title">All Products</h2>
                    <span class="result-count" id="result-count">Loading...</span>
                </div>
                <div id="shop-grid" class="product-grid">
                    <!-- skeleton placeholders -->
                    <div class="skeleton" style="height:280px;border-radius:var(--radius)"></div>
                    <div class="skeleton" style="height:280px;border-radius:var(--radius)"></div>
                    <div class="skeleton" style="height:280px;border-radius:var(--radius)"></div>
                    <div class="skeleton" style="height:280px;border-radius:var(--radius)"></div>
                    <div class="skeleton" style="height:280px;border-radius:var(--radius)"></div>
                    <div class="skeleton" style="height:280px;border-radius:var(--radius)"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import ui from './js/ui.js';
        import api from './js/api.js';
        import { mapper } from './js/mapper.js';

        const params = new URLSearchParams(location.search);
        let currentCategoryId = params.get('category') || null;
        let searchQuery = params.get('search') || '';

        async function init() {
            try { await ui.init(); } catch (e) { console.warn('ui.init error:', e); }

            // If search query from URL, populate search input
            if (searchQuery) {
                const inp = document.getElementById('search-input');
                if (inp) inp.value = searchQuery;
            }

            // Load categories into sidebar
            try {
                const cats = await api.getCategories();
                const sidebar = document.getElementById('sidebar-categories');
                if (cats.length) {
                    sidebar.innerHTML = `
                        <a onclick="window.filterBy(null)" class="${!currentCategoryId ? 'active' : ''}">All Products</a>
                        ${cats.map(c => `<a onclick="window.filterBy(${c.id}, '${c.name.replace(/'/g, "\\'")}')" class="${currentCategoryId == c.id ? 'active' : ''}">${c.name}</a>`).join('')}
                    `;
                }
            } catch (e) { console.warn('Categories sidebar error:', e); }

            await loadProducts();
        }

        async function loadProducts() {
            const grid = document.getElementById('shop-grid');
            // Show new skeletons while loading
            grid.innerHTML = `
                <div class="skeleton" style="height:280px;border-radius:var(--radius)"></div>
                <div class="skeleton" style="height:280px;border-radius:var(--radius)"></div>
                <div class="skeleton" style="height:280px;border-radius:var(--radius)"></div>
            `;

            try {
                const filters = {};
                if (currentCategoryId) filters.category_id = currentCategoryId;
                if (searchQuery) filters.search = searchQuery;

                const products = await api.getProducts(filters);
                renderProducts(products);
            } catch (e) {
                console.error('loadProducts error:', e);
                grid.innerHTML = '<p class="empty-msg">Failed to load products. Please try again.</p>';
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('shop-grid');
            const count = document.getElementById('result-count');
            count.textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;

            if (!products.length) {
                grid.innerHTML = '<p class="empty-msg" style="grid-column:1/-1">No products found for this selection.</p>';
                return;
            }

            grid.innerHTML = products.map(p => {
                const m = mapper.mapProduct(p);
                return `
                <div class="product-card fade-in" onclick="location.href='product.html?id=${m.id}'">
                    ${m.discountLabel ? `<span class="offer-label">${m.discountLabel}</span>` : ''}
                    <img src="${m.image}" class="product-image" alt="${m.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'">
                    <h3 class="product-title">${m.name}</h3>
                    <div class="product-price-row">
                        <span class="current-price">${mapper.formatCurrency(m.price)}</span>
                        ${m.comparePrice ? `<span class="compare-price">${mapper.formatCurrency(m.comparePrice)}</span>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        window.filterBy = (categoryId, name) => {
            currentCategoryId = categoryId;
            document.getElementById('shop-title').textContent = name || 'All Products';

            // UI state update
            const links = document.querySelectorAll('.filter-panel a');
            links.forEach(a => a.classList.remove('active'));

            // Find the clicked element or the first one if null
            if (categoryId === null) {
                links[0]?.classList.add('active');
            } else {
                // If clicked via JS, we might not have the event target directly in a reliable way across browsers if called from onclick
                // but for simple cases like this it works. 
                event?.target?.classList?.add('active');
            }

            loadProducts();
        };

        init();
    </script>
</body>

</html>
