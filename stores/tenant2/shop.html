<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Catalog</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .flex {
            display: flex;
        }

        .grid {
            display: grid;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .flex-col {
            flex-direction: column;
        }

        .gap-4 {
            gap: 1rem;
        }

        .gap-6 {
            gap: 1.5rem;
        }

        .gap-8 {
            gap: 2rem;
        }

        .p-4 {
            padding: 1rem;
        }

        .p-6 {
            padding: 1.5rem;
        }

        .p-8 {
            padding: 2rem;
        }

        .px-6 {
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }

        .py-12 {
            padding-top: 3rem;
            padding-bottom: 3rem;
        }

        .py-20 {
            padding-top: 5rem;
            padding-bottom: 5rem;
        }

        .mb-8 {
            margin-bottom: 2rem;
        }

        .text-center {
            text-align: center;
        }

        .text-slate-400 {
            color: #94a3b8;
        }

        .text-slate-800 {
            color: #1e293b;
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .text-lg {
            font-size: 1.125rem;
        }

        .text-3xl {
            font-size: 1.875rem;
        }

        .font-bold {
            font-weight: 700;
        }

        .rounded-xl {
            border-radius: 0.75rem;
        }

        .rounded-2xl {
            border-radius: 1rem;
        }

        .bg-white {
            background-color: white;
        }

        .bg-slate-50 {
            background-color: #f8fafc;
        }

        .bg-primary {
            background-color: var(--primary);
        }

        .shadow-sm {
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .w-full {
            width: 100%;
        }

        .h-full {
            height: 100%;
        }

        .sticky {
            position: sticky;
        }

        .top-0 {
            top: 0;
        }

        .transition-all {
            transition: all 0.2s;
        }

        .aspect-square {
            aspect-ratio: 1 / 1;
        }

        .object-cover {
            object-fit: cover;
        }

        .border-t {
            border-top: 1px solid #f1f5f9;
        }

        .list-none {
            list-style: none;
        }

        .sidebar {
            width: 280px;
        }

        .content {
            flex: 1;
        }

        .filter-group {
            margin-bottom: 2rem;
        }

        .filter-title {
            font-weight: 700;
            margin-bottom: 1rem;
            display: block;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #64748b;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 0.5rem 0;
        }

        .filter-item:hover {
            color: var(--primary);
        }

        .filter-item input {
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        @media (max-width: 768px) {
            .shop-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>

<body class="bg-white">

    <!-- Header -->
    <header>
        <div class="container flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" id="store-logo" class="brand-font text-2xl font-black text-slate-800"
                    style="text-decoration: none;">STORE</a>
                <nav class="flex gap-6">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="cart-btn p-2 text-slate-400 hover:text-slate-800 transition-all">
                    <i data-lucide="shopping-bag"></i>
                    <span class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Page Header (Dynamic Banner could go here) -->
    <div class="py-12 bg-slate-50 border-b border-slate-100">
        <div class="container">
            <h1 class="text-3xl font-bold text-slate-800">Shop Our Collections</h1>
            <p class="text-slate-400 mt-2">Discover premium quality products selected for you.</p>
        </div>
    </div>

    <!-- Shop Content -->
    <section class="py-12">
        <div class="container">
            <div class="shop-layout flex gap-10">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <div class="filter-group">
                        <span class="filter-title">Categories</span>
                        <div id="categories-filters" class="flex flex-col">
                            <label class="filter-item"><input type="checkbox" checked /> All Products</label>
                            <!-- Dynamically populated -->
                        </div>
                    </div>
                </aside>

                <!-- Product Grid -->
                <main class="content">
                    <div class="flex justify-between items-center mb-8">
                        <span id="results-count" class="text-sm text-slate-400">Showing 0 products</span>
                        <select class="p-2 border border-slate-200 rounded-xl text-sm">
                            <option>Sort by: Newest</option>
                            <option>Price: Low to High</option>
                            <option>Price: High to Low</option>
                        </select>
                    </div>
                    <div class="products-grid grid"
                        style="grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem;">
                        <!-- Dynamically populated via shop.js -->
                        <div class="text-center py-20 text-slate-300 w-full col-span-full">
                            Retrieving products...
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/shop.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setTimeout(() => lucide.createIcons(), 2000);
        });
    </script>
</body>

</html>
