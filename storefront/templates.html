<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Template | EcomSuite</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Page-specific layout */
        body {
            background: #f8f9fb;
        }

        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Top bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 36px;
        }

        .topbar-logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: none;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        /* Section header */
        .section-head {
            margin-bottom: 28px;
        }

        .section-head h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
        }

        .section-head p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* State badges */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-featured {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-popular {
            background: #dcfce7;
            color: #14532d;
        }

        .badge-new {
            background: #dbeafe;
            color: #1e40af;
        }

        /* Template card */
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 22px;
        }

        .template-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid #e5e7eb;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .template-card:hover {
            border-color: #9ca3af;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            transform: translateY(-3px);
        }

        .template-card.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(30, 58, 52, 0.08);
        }

        .template-img-wrap {
            position: relative;
            width: 100%;
            height: 190px;
            overflow: hidden;
            background: #e5e7eb;
        }

        .template-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .template-card:hover .template-img {
            transform: scale(1.04);
        }

        .template-check {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 26px;
            height: 26px;
            background: var(--primary);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
        }

        .template-card.active .template-check {
            display: flex;
        }

        .template-card-body {
            padding: 16px 18px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .template-card-name {
            font-size: 15px;
            font-weight: 700;
            color: #111827;
        }

        .template-card-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .template-card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        /* Skeleton */
        .skeleton-card {
            background: #e5e7eb;
            border-radius: 12px;
            height: 280px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Footer bar */
        .confirm-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            padding: 18px 28px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            margin-top: 36px;
        }

        .confirm-bar-info {
            font-size: 14px;
            color: var(--text-muted);
        }

        .confirm-bar-info strong {
            color: var(--text-main);
        }

        /* Empty / error */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>
    <div class="page-wrap">

        <!-- Top bar -->
        <div class="topbar">
            <span class="topbar-logo">EcomSuite.</span>
            <a href="index.html" class="back-btn">&#x2190; Back</a>
        </div>

        <!-- Header -->
        <div class="section-head">
            <h1>Choose Your Theme</h1>
            <p>Select a starting template for your storefront. All templates are fully integrated with Supabase and
                ready to deploy on Hostinger.</p>
        </div>

        <!-- Template Grid — populated from ecom_templates (Supabase) -->
        <div class="template-grid" id="template-grid">
            <!-- Skeleton placeholders while loading -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>

        <!-- Confirm / Continue bar -->
        <div class="confirm-bar">
            <div class="confirm-bar-info">
                Selected: <strong id="selected-name">None</strong>
            </div>
            <button class="btn btn-primary" id="confirm-btn" disabled>
                Generate Storefront &rarr;
            </button>
        </div>
    </div>

    <!-- Modal on success -->
    <div id="success-modal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:white; border-radius:16px; padding:40px; max-width:540px; width:90%; text-align:center;">
            <div style="font-size:56px; margin-bottom:16px;">🚀</div>
            <h2 style="font-size:24px; font-weight:800;">Store Ready!</h2>
            <p style="color:var(--text-muted); margin:16px 0;" id="modal-msg"></p>
            <div style="background:#0f172a; color:#4ade80; font-family:monospace; padding:18px; border-radius:8px; text-align:left; font-size:13px;"
                id="modal-cmd"></div>
            <p style="font-size:12px; color:var(--text-muted); margin-top:12px;">Run the command above in your project
                root to generate the static files for Hostinger upload.</p>
            <button class="btn btn-primary" style="margin-top:24px; width:100%;"
                onclick="document.getElementById('success-modal').style.display='none'">Done</button>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/config.js';

        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        /* ── State ─────────────────────────────────────────── */
        let selectedTemplate = null;
        const onboarding = JSON.parse(localStorage.getItem('onboarding_data') || '{}');

        /* ── Load from ecom_templates (Supabase) ──────────── */
        async function loadTemplates() {
            const grid = document.getElementById('template-grid');
            try {
                const { data, error } = await supabase
                    .from('ecom_templates')
                    .select('folder, name, description, version, preview_image, tags')
                    .eq('is_active', true)
                    .order('sort_order', { ascending: true });

                if (error) throw error;
                renderTemplates(data || []);
            } catch (err) {
                console.error('Failed to load templates:', err);
                grid.innerHTML = `<div class="empty-state">
                    <p>⚠️ Could not load templates.</p>
                    <p style="font-size:12px;margin-top:8px;">Run the migration to create the <code>ecom_templates</code> table in Supabase.</p>
                </div>`;
            }
        }

        /* ── Render ─────────────────────────────────────────── */
        function renderTemplates(templates) {
            const grid = document.getElementById('template-grid');
            if (!templates.length) {
                grid.innerHTML = `<div class="empty-state"><p>No templates found.<br>Add rows to the <code>ecom_templates</code> table in Supabase.</p></div>`;
                return;
            }

            grid.innerHTML = templates.map(t => {
                const tagBadges = (t.tags || []).map(tag => `<span class="badge badge-${tag}">${tag}</span>`).join('');
                return `
                <div class="template-card fade-in" data-id="${t.folder}" data-name="${t.name}" data-folder="${t.folder}">
                    <div class="template-img-wrap">
                        <img class="template-img" src="${t.preview_image}" alt="${t.name}" loading="lazy">
                        <div class="template-check">✓</div>
                    </div>
                    <div class="template-card-body">
                        <div class="template-card-name">${t.name} <span style="font-size:11px;color:var(--text-muted);font-weight:400;">v${t.version || '1.0'}</span></div>
                        <div class="template-card-tags">${tagBadges}</div>
                        <div class="template-card-desc">${t.description || ''}</div>
                    </div>
                </div>`;
            }).join('');

            grid.querySelectorAll('.template-card').forEach(card => {
                card.addEventListener('click', () => selectTemplate(card));
            });
        }

        /* ── Selection Logic ─────────────────────────────────── */
        function selectTemplate(card) {
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            selectedTemplate = { id: card.dataset.id, name: card.dataset.name, folder: card.dataset.folder };
            document.getElementById('selected-name').textContent = selectedTemplate.name;
            document.getElementById('confirm-btn').disabled = false;
        }

        /* ── Generate Storefront ─────────────────────────────── */
        document.getElementById('confirm-btn').addEventListener('click', () => {
            if (!selectedTemplate) return;
            const storeName = (onboarding.name || 'my-store').toLowerCase().replace(/\s+/g, '-');
            const companyId = onboarding.company_id || 1;

            document.getElementById('modal-msg').textContent =
                `"${onboarding.name || storeName}" using "${selectedTemplate.name}" is ready to generate in /stores/${storeName}.`;

            document.getElementById('modal-cmd').innerHTML =
                `<span style="color:#94a3b8"># Run in your project root:</span>\n` +
                `node provision_store.cjs ${storeName} ${companyId} ${selectedTemplate.folder}`;

            document.getElementById('success-modal').style.display = 'flex';
        });

        /* ── Boot ───────────────────────────────────────────── */
        loadTemplates();
    </script>
</body>

</html>
