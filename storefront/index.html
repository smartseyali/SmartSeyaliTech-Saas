<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Hub | Build Your Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">EcomSuite.</div>
            <a href="#" class="btn btn-primary">Login</a>
        </header>

        <section class="hero">
            <h1>Turn Your Business <br> Into a Global Brand.</h1>
            <p>Create a specialized, production-ready storefront directory ready for Hostinger or any static hosting.
            </p>

            <div class="card">
                <h3>Start Your Journey</h3>
                <form id="onboarding-form" style="margin-top: 20px;">
                    <div class="form-group" style="text-align: left;">
                        <label>Merchant / Store Name</label>
                        <input type="text" name="name" class="form-input" placeholder="e.g. spark-electronics" required>
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label>Business Email</label>
                        <input type="email" name="email" class="form-input" placeholder="hello@spark.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Continue to Templates
                        &rarr;</button>
                </form>
            </div>
        </section>
    </div>

    <script>
        document.getElementById('onboarding-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            localStorage.setItem('onboarding_data', JSON.stringify(data));
            window.location.href = 'templates.html';
        });
    </script>
</body>

</html>
