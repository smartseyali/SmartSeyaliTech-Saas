<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - Pattikadai</title>
  <link rel="icon" href="assets/img/favicon/favicon.png">
  <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/vendor/remixicon.css">
  <link rel="stylesheet" href="assets/css/vendor/aos.css">
  <link rel="stylesheet" href="assets/css/vendor/swiper-bundle.min.css">
  <link rel="stylesheet" href="assets/css/vendor/owl.carousel.min.css">
  <link rel="stylesheet" href="assets/css/vendor/animate.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>

  <header class="bb-header" id="header-placeholder"></header>
  <div class="header-spacer"></div>

  <!-- Breadcrumb -->
  <div class="bb-breadcrumb">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a href="/">Home</a></li>
          <li class="breadcrumb-item"><a href="shop">Shop</a></li>
          <li class="breadcrumb-item active" id="breadcrumb-product">Product</li>
        </ol>
      </nav>
    </div>
  </div>

  <!-- Product Detail -->
  <section class="container mt-4 mb-5">
    <div class="row" id="product-detail">
      <div class="col-12 text-center py-5">
        <div class="loading-skeleton" style="height: 400px; max-width: 800px; margin: 0 auto;"></div>
      </div>
    </div>
  </section>

  <!-- Reviews Section -->
  <section class="container mb-5">
    <h4 class="fw-bold mb-3">Customer Reviews</h4>
    <div id="product-reviews">
      <div class="loading-skeleton" style="height: 100px;"></div>
    </div>

    <!-- Review Form (visible if logged in) -->
    <div id="review-form-container" class="mt-4" style="display: none;">
      <h5>Write a Review</h5>
      <form id="review-form" onsubmit="submitReview(event)">
        <div class="mb-3">
          <label class="form-label">Rating</label>
          <div class="star-rating-input" id="rating-stars">
            <i class="ri-star-line fs-4 cursor-pointer" data-rating="1"></i>
            <i class="ri-star-line fs-4 cursor-pointer" data-rating="2"></i>
            <i class="ri-star-line fs-4 cursor-pointer" data-rating="3"></i>
            <i class="ri-star-line fs-4 cursor-pointer" data-rating="4"></i>
            <i class="ri-star-line fs-4 cursor-pointer" data-rating="5"></i>
          </div>
          <input type="hidden" id="review-rating" value="5">
        </div>
        <div class="mb-3">
          <label class="form-label">Comment</label>
          <textarea class="form-control" id="review-comment" rows="3" required></textarea>
        </div>
        <button type="submit" class="bb-btn-2">Submit Review</button>
      </form>
    </div>
  </section>

  <!-- Related Products -->
  <section class="container mb-5">
    <div class="section-title">
      <h2>Related Products</h2>
    </div>
    <div class="row" id="related-products"></div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/main.js"></script>

  <script>
    let currentProduct = null;
    let currentVariants = [];
    let selectedVariant = null;
    let quantity = 1;

    onAppReady(async () => {

      const productId = getUrlParam('id');
      if (!productId) {
        document.getElementById('product-detail').innerHTML = '<div class="col-12 text-center py-5"><h4>Product not found</h4><a href="shop" class="bb-btn-2 mt-3">Back to Shop</a></div>';
        return;
      }

      await loadProduct(productId);
      loadReviews(productId);
      checkReviewEligibility();
      initRatingStars();
    });

    async function loadProduct(id) {
      const container = document.getElementById('product-detail');

      const [product, variants] = await Promise.all([
        API.getProductById(id),
        API.getProductVariants(id),
      ]);

      if (!product) {
        container.innerHTML = '<div class="col-12 text-center py-5"><h4>Product not found</h4><a href="shop" class="bb-btn-2 mt-3">Back to Shop</a></div>';
        return;
      }

      currentProduct = product;
      currentVariants = variants;

      // Update page title
      const productName = product.item_name || '';
      document.title = `${productName} - Pattikadai`;
      document.getElementById('breadcrumb-product').textContent = productName;

      const price = product.selling_price || 0;
      const mrp = product.mrp || product.selling_price || 0;
      const discount = mrp > price ? Math.round(((mrp - price) / mrp) * 100) : 0;
      const imageUrl = product.image_url || 'assets/img/product/default.jpg';
      const categoryName = product.master_categories?.name || '';
      // Stock logic: if variants exist, use first variant's is_in_stock; otherwise use parent's current_stock
      let inStock;
      if (variants.length > 0) {
        inStock = variants[0].is_in_stock !== false;
      } else {
        inStock = typeof product.current_stock !== 'number' || product.current_stock > 0;
      }

      container.innerHTML = `
        <div class="col-lg-5 mb-4">
          <div class="product-detail-img">
            <img src="${imageUrl}" alt="${escapeHtml(productName)}" id="product-main-image" style="width: 100%; border-radius: 12px;">
          </div>
        </div>
        <div class="col-lg-7">
          <div class="product-detail-info">
            ${categoryName ? `<span class="badge bg-light text-dark mb-2">${escapeHtml(categoryName)}</span>` : ''}
            <h1>${escapeHtml(productName)}</h1>
            ${product.item_code ? `<p class="text-muted mb-2">SKU: ${escapeHtml(product.item_code)}</p>` : ''}

            <div class="mb-3">
              <span class="price" id="product-price">${formatPrice(price)}</span>
              <span class="old-price ms-2" id="product-mrp" ${mrp > price ? '' : 'style="display:none;"'}>${formatPrice(mrp)}</span>
              <span class="badge bg-danger ms-2" id="product-discount" ${discount > 0 ? '' : 'style="display:none;"'}>${discount}% OFF</span>
            </div>

            <span class="badge mb-3" id="stock-badge" style="background:${inStock ? '#198754' : '#dc3545'}">${inStock ? 'In Stock' : 'Out of Stock'}</span>

            ${product.description ? `<p class="mb-3">${product.description}</p>` : ''}
            ${product.long_description ? `<div class="mb-3">${product.long_description}</div>` : ''}

            <!-- Variants: Color / Size selectors -->
            ${renderVariantSelectors(variants)}

            <!-- Quantity -->
            <div class="mb-3">
              <h6 class="fw-bold mb-2">Quantity</h6>
              <div class="qty-controls">
                <button onclick="updateQty(-1)">-</button>
                <input type="number" id="product-qty" value="1" min="1" readonly>
                <button onclick="updateQty(1)">+</button>
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex gap-3 flex-wrap mt-4">
              <button class="bb-btn-2" id="add-to-cart-btn" onclick="addProductToCart()" ${!inStock ? 'disabled' : ''}>
                ${inStock ? '<i class="ri-shopping-bag-line me-2"></i>Add to Cart' : 'Out of Stock'}
              </button>
              <button class="bb-btn-2" id="buy-now-btn" onclick="buyNow()" style="background-color: #333; border-color: #333;" ${!inStock ? 'disabled' : ''}>
                ${inStock ? '<i class="ri-flashlight-line me-2"></i>Buy Now' : 'Out of Stock'}
              </button>
              <button class="btn btn-outline-danger" id="wishlist-btn" onclick="addToWishlistFromDetail()">
                <i class="ri-heart-line me-2"></i>Wishlist
              </button>
            </div>
          </div>
        </div>
      `;

      // Load related products
      loadRelatedProducts(product.category_id, product.id);

      // Auto-select first variant
      if (variants.length > 0) {
        const firstVariant = variants[0];
        if (firstVariant.color) selectedColor = firstVariant.color;
        if (firstVariant.size) selectedSize = firstVariant.size;
        applyVariant(firstVariant);
      }
    }

    // ─── Variant Rendering ─────────────────────────────────
    let selectedColor = null;
    let selectedSize = null;

    function renderVariantSelectors(variants) {
      if (!variants || variants.length === 0) return '';

      const colors = [...new Set(variants.map(v => v.color).filter(Boolean))];
      const sizes = [...new Set(variants.map(v => v.size).filter(Boolean))];
      const hasColors = colors.length > 0;
      const hasSizes = sizes.length > 0;

      // If no structured attributes, fall back to simple buttons
      if (!hasColors && !hasSizes) {
        return `
          <div class="mb-3">
            <h6 class="fw-bold mb-2">Options</h6>
            <div class="d-flex flex-wrap gap-2" id="variant-buttons">
              ${variants.map((v, i) => `
                <button class="variant-btn ${i === 0 ? 'active' : ''}" onclick="selectVariantByIndex(${i})">
                  ${escapeHtml(v.name)}
                  ${v.selling_price ? ` - ${formatPrice(v.selling_price)}` : ''}
                </button>
              `).join('')}
            </div>
          </div>`;
      }

      let html = '';

      // Color selector with image thumbnails
      if (hasColors) {
        html += `
          <div class="mb-3">
            <h6 class="fw-bold mb-2">Color: <span id="selected-color-label" class="text-muted fw-normal">${escapeHtml(colors[0])}</span></h6>
            <div class="d-flex flex-wrap gap-2" id="color-buttons">
              ${colors.map((color, i) => {
                const colorVariant = variants.find(v => v.color === color);
                const thumb = colorVariant?.image_url;
                return `
                  <button class="variant-color-btn ${i === 0 ? 'active' : ''}" onclick="selectColor('${escapeHtml(color)}')" title="${escapeHtml(color)}">
                    ${thumb
                      ? `<img src="${thumb}" alt="${escapeHtml(color)}" style="width:48px;height:48px;object-fit:cover;border-radius:6px;">`
                      : `<span class="color-label">${escapeHtml(color)}</span>`}
                  </button>`;
              }).join('')}
            </div>
          </div>`;
      }

      // Size selector
      if (hasSizes) {
        html += `
          <div class="mb-3">
            <h6 class="fw-bold mb-2">Size: <span id="selected-size-label" class="text-muted fw-normal">${escapeHtml(sizes[0])}</span></h6>
            <div class="d-flex flex-wrap gap-2" id="size-buttons">
              ${sizes.map((size, i) => `
                <button class="variant-size-btn ${i === 0 ? 'active' : ''}" onclick="selectSize('${escapeHtml(size)}')">
                  ${escapeHtml(size)}
                </button>
              `).join('')}
            </div>
          </div>`;
      }

      return html;
    }

    function selectColor(color) {
      selectedColor = color;
      document.querySelectorAll('.variant-color-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('title') === color);
      });
      const label = document.getElementById('selected-color-label');
      if (label) label.textContent = color;
      resolveVariant();
    }

    function selectSize(size) {
      selectedSize = size;
      document.querySelectorAll('.variant-size-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim() === size);
      });
      const label = document.getElementById('selected-size-label');
      if (label) label.textContent = size;
      resolveVariant();
    }

    // Find the matching variant based on selected color + size
    function resolveVariant() {
      let match = null;

      if (selectedColor && selectedSize) {
        match = currentVariants.find(v => v.color === selectedColor && v.size === selectedSize);
      } else if (selectedColor) {
        match = currentVariants.find(v => v.color === selectedColor);
      } else if (selectedSize) {
        match = currentVariants.find(v => v.size === selectedSize);
      }

      if (match) {
        applyVariant(match);
      }
    }

    // Simple index-based selection (fallback when no color/size)
    function selectVariantByIndex(index) {
      const variant = currentVariants[index];
      if (!variant) return;
      document.querySelectorAll('.variant-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });
      applyVariant(variant);
    }

    // Apply a variant: update image, price, MRP, discount
    function applyVariant(variant) {
      selectedVariant = variant;
      const basePrice = currentProduct.selling_price || 0;
      const baseMrp = currentProduct.mrp || currentProduct.selling_price || 0;

      const newPrice = variant.selling_price || (basePrice + (variant.price_adjustment || 0));
      const newMrp = variant.mrp || (variant.selling_price ? variant.selling_price : (baseMrp + (variant.price_adjustment || 0)));

      // Update price
      document.getElementById('product-price').textContent = formatPrice(newPrice);

      // Update MRP and discount badge
      const mrpEl = document.getElementById('product-mrp');
      const discountBadge = document.getElementById('product-discount');
      if (mrpEl) {
        if (newMrp > newPrice) {
          mrpEl.textContent = formatPrice(newMrp);
          mrpEl.style.display = '';
        } else {
          mrpEl.style.display = 'none';
        }
      }
      if (discountBadge) {
        if (newMrp > newPrice) {
          const disc = Math.round(((newMrp - newPrice) / newMrp) * 100);
          discountBadge.textContent = disc + '% OFF';
          discountBadge.style.display = '';
        } else {
          discountBadge.style.display = 'none';
        }
      }

      // Switch product image to variant image
      if (variant.image_url) {
        const mainImg = document.getElementById('product-main-image');
        if (mainImg) mainImg.src = variant.image_url;
      }

      // Update stock status based on variant's is_in_stock boolean
      const inStock = variant.is_in_stock !== false;

      // Update stock badge
      const stockBadge = document.getElementById('stock-badge');
      if (stockBadge) {
        stockBadge.textContent = inStock ? 'In Stock' : 'Out of Stock';
        stockBadge.style.background = inStock ? '#198754' : '#dc3545';
      }

      // Update buttons
      const cartBtn = document.getElementById('add-to-cart-btn');
      const buyBtn = document.getElementById('buy-now-btn');
      if (cartBtn) {
        cartBtn.disabled = !inStock;
        cartBtn.innerHTML = inStock ? '<i class="ri-shopping-bag-line me-2"></i>Add to Cart' : 'Out of Stock';
      }
      if (buyBtn) {
        buyBtn.disabled = !inStock;
        buyBtn.innerHTML = inStock ? '<i class="ri-flashlight-line me-2"></i>Buy Now' : 'Out of Stock';
      }
    }

    // Legacy alias
    function selectVariant(index) { selectVariantByIndex(index); }

    function updateQty(delta) {
      quantity = Math.max(1, quantity + delta);
      document.getElementById('product-qty').value = quantity;
    }

    function addProductToCart() {
      if (!currentProduct) return;
      Cart.addItem(currentProduct, quantity, selectedVariant);
    }

    function buyNow() {
      addProductToCart();
      window.location.href = 'checkout';
    }

    function addToWishlistFromDetail() {
      if (!currentProduct) return;
      API.addToWishlist(currentProduct);
      showToast('Added to wishlist!', 'success');
      document.querySelectorAll('.wishlist-count-badge').forEach(el => {
        el.textContent = API.getWishlist().length;
      });
    }

    async function loadReviews(productId) {
      const container = document.getElementById('product-reviews');
      const reviews = await API.getProductReviews(productId);

      if (reviews.length === 0) {
        container.innerHTML = '<p class="text-muted">No reviews yet. Be the first to review!</p>';
        return;
      }

      container.innerHTML = reviews.map(r => `
        <div class="border rounded p-3 mb-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
              <strong>${escapeHtml(r.customer_name || 'Customer')}</strong>
              <div class="star-rating">
                ${[1,2,3,4,5].map(s => `<i class="ri-star-${s <= r.rating ? 'fill' : 'line'}"></i>`).join('')}
              </div>
            </div>
            <small class="text-muted">${new Date(r.created_at).toLocaleDateString()}</small>
          </div>
          ${r.title ? `<h6 class="mb-1">${escapeHtml(r.title)}</h6>` : ''}
          <p class="mb-0">${escapeHtml(r.review || '')}</p>
        </div>
      `).join('');
    }

    async function checkReviewEligibility() {
      const isLoggedIn = await Auth.isLoggedIn();
      if (isLoggedIn) {
        document.getElementById('review-form-container').style.display = 'block';
      }
    }

    function initRatingStars() {
      document.querySelectorAll('#rating-stars i').forEach(star => {
        star.addEventListener('click', function() {
          const rating = this.dataset.rating;
          document.getElementById('review-rating').value = rating;
          document.querySelectorAll('#rating-stars i').forEach((s, i) => {
            s.className = i < rating ? 'ri-star-fill fs-4 cursor-pointer text-warning' : 'ri-star-line fs-4 cursor-pointer';
          });
        });
      });
    }

    async function submitReview(e) {
      e.preventDefault();
      const user = await Auth.getUser();
      if (!user) { showToast('Please login to submit a review', 'error'); return; }

      const rating = parseInt(document.getElementById('review-rating').value);
      const comment = document.getElementById('review-comment').value;
      const productId = getUrlParam('id');

      const review = await API.createReview({
        product_id: productId,
        rating,
        review: comment,
        customer_name: user.user_metadata?.full_name || user.email,
        customer_email: user.email,
      });

      if (review) {
        showToast('Review submitted!', 'success');
        document.getElementById('review-comment').value = '';
        loadReviews(productId);
      } else {
        showToast('Error submitting review', 'error');
      }
    }

    async function loadRelatedProducts(categoryId, excludeId) {
      const container = document.getElementById('related-products');
      if (!categoryId) { container.innerHTML = ''; return; }

      const products = await API.getProducts({ categoryId, limit: 4 });
      const related = products.filter(p => p.id !== excludeId);

      if (related.length === 0) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = related.map(p => renderProductCard(p)).join('');
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
